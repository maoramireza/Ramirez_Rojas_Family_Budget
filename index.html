<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ramirez Rojas Family Budget</title>
</head>
<body>
  <div id="root"></div>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/main.min.js"></script>

  <script type="text/babel">
const { useState, useRef, useEffect, useMemo } = React;
const { createClient } = window.supabase;
const SUPABASE_URL = "https://yjgeakxdhgjhzstvmziq.supabase.co";
const SUPABASE_KEY = "sb_publishable_9SIlkXrWdAW_ircXhZ_bCg_APPKieBA";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
const ALLOWED = ["maoramirezaragon@gmail.com", "irojascantor@gmail.com"];

/* ---- archive helpers ---- */
window.loadArchives = async () => {
  try {
    const { data, error } = await supabase.from("budget_archive").select("year,state").order("year", { ascending: true });
    if (!error && data) return data;
  } catch (e) { }
  return [];
};

window.saveArchive = async (year, state) => {
  try {
    const session = (await supabase.auth.getSession()).data?.session;
    const { error } = await supabase.from("budget_archive").upsert(
      { year, state, saved_at: new Date().toISOString(), saved_by: session?.user?.id },
      { onConflict: "year" }
    );
    if (error) throw error;
    return true;
  } catch (e) { throw new Error("Failed to archive: " + (e.message || "unknown")); }
};

const TYPES = ["Income", "Expenses", "Savings"];
const MLABEL = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const fmt = (n) => new Intl.NumberFormat("en-US", {style:"currency", currency:"USD", minimumFractionDigits:0}).format(n);
const mk = (y,m) => `${y}-${String(m).padStart(2,"0")}`;

// BASELINE - injected during build
const BASELINE = {
  categories: {"Income": ["Salary Mao", "Salary Ingrid", "Primas Ingrid", "Other"], "Expenses": ["House Mortgage", "Cell phones", "Pepco", "Water", "Amazon Prime", "Disney+", "Netflix", "Sofa", "Apple Care Ipad y Celular Mao", "Car Insurance", "Verizon", "Peloton Monthly subscription", "Metro", "Gas", "Groceries", "Restaurants and fun", "Shopping", "Carro", "Mantenimiento casa", "Futbol Luca", "Lavado carro", "Pelo Ingrid", "Comedor"], "Savings": ["Ahorro Ingrid", "Ahorro Mao"]},
  buckets: {"Subscriptions": {name:"Subscriptions"}, "Utilities": {name:"Utilities"}, "Transportation": {name:"Transportation"}, "Entertainment": {name:"Entertainment"}},
  plan: {},
  entries: []
};

function App({ session, onSignOut }) {
  const [state, setState] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [saved, setSaved] = useState(false);
  const [archives, setArchives] = useState([]);
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth()+1);
  const [tab, setTab] = useState("dashboard");
  const [showLogoutWarning, setShowLogoutWarning] = useState(false);
  const [secondsLeft, setSecondsLeft] = useState(0);
  const firstSave = useRef(true);
  const lastActivityRef = useRef(Date.now());
  const warningShownRef = useRef(false);
  const INACTIVITY_TIMEOUT = 30 * 60 * 1000;
  const WARNING_TIME = 2 * 60 * 1000;
  const month_key = mk(year, month);

  // Core update function
  const update = (fn) => setState((s) => { const t = structuredClone(s); fn(t); return t; });
  
  // Bucket management
  const addBucket = (name) => {
    update((s) => {
      if (!s.buckets) s.buckets = {};
      if (s.buckets[name]) return;
      s.buckets[name] = { name };
    });
  };

  const renameBucket = (oldName, newName) => {
    update((s) => {
      if (!s.buckets || !s.buckets[oldName] || newName === oldName) return;
      s.buckets[newName] = { name: newName };
      delete s.buckets[oldName];
      s.entries.forEach((e) => { if (e.bucket === oldName) e.bucket = newName; });
    });
  };

  const deleteBucket = (name) => {
    update((s) => {
      if (!s.buckets || !s.buckets[name]) return;
      delete s.buckets[name];
      s.entries.forEach((e) => { if (e.bucket === name) e.bucket = undefined; });
    });
  };

  // Entry management
  const addEntry = (type, date, cat, amount, name) => {
    update((s) => {
      if (!s.entries) s.entries = [];
      s.entries.push({ id: Date.now().toString(), type, date, category: cat, amount, name, bucket: undefined });
    });
  };

  const deleteEntry = (id) => {
    update((s) => { s.entries = s.entries.filter((e) => e.id !== id); });
  };

  const editEntry = (id, field, value) => {
    update((s) => {
      const e = s.entries.find((x) => x.id === id);
      if (e) e[field] = value;
    });
  };

  const setBucketForEntry = (id, bucketName) => {
    update((s) => {
      const e = s.entries.find((x) => x.id === id);
      if (e) e.bucket = bucketName || undefined;
    });
  };

  // Plan management
  const setPlanAmt = (type, cat, month_key, amt) => {
    update((s) => {
      if (!s.plan[type]) s.plan[type] = {};
      if (!s.plan[type][cat]) s.plan[type][cat] = {};
      if (amt === 0 || !amt) delete s.plan[type][cat][month_key];
      else s.plan[type][cat][month_key] = amt;
    });
  };

  const addCat = (type, name) => {
    update((s) => {
      if (!s.categories[type].includes(name)) s.categories[type].push(name);
    });
  };

  const removeCat = (type, cat) => {
    update((s) => {
      s.categories[type] = s.categories[type].filter((c) => c !== cat);
      delete s.plan[type][cat];
    });
  };

  const renameCat = (type, oldName, newName) => {
    update((s) => {
      const idx = s.categories[type].indexOf(oldName);
      if (idx >= 0) s.categories[type][idx] = newName;
      if (s.plan[type][oldName]) {
        s.plan[type][newName] = s.plan[type][oldName];
        delete s.plan[type][oldName];
      }
      s.entries.forEach((e) => { if (e.category === oldName) e.category = newName; });
    });
  };

  const copyFrom = (source_month_key) => {
    update((s) => {
      TYPES.forEach((type) => {
        s.categories[type].forEach((cat) => {
          const src = s.plan[type]?.[cat]?.[source_month_key];
          if (src) s.plan[type][cat][month_key] = src;
        });
      });
    });
  };

  const resetPlan = () => {
    update((s) => {
      TYPES.forEach((type) => {
        s.plan[type] = {};
        s.categories[type].forEach((c) => { s.plan[type][c] = {}; });
      });
    });
  };

  // Year archive
  const endYear = async () => {
    const yr = year;
    if (!confirm(`Archive the ${yr} budget?`)) return;
    try {
      if (window.saveArchive) {
        await window.saveArchive(yr, state);
        alert(`✓ Year ${yr} archived!`);
        update((s) => {
          TYPES.forEach((type) => {
            s.plan[type] = {};
            s.categories[type].forEach((c) => { s.plan[type][c] = {}; });
          });
        });
        setYear(yr + 1);
        setMonth(1);
        if (window.loadArchives) {
          const a = await window.loadArchives();
          setArchives(a || []);
        }
      }
    } catch (e) {
      alert("Error archiving: " + e.message);
    }
  };

  // Activity tracking
  const resetActivity = () => {
    lastActivityRef.current = Date.now();
    warningShownRef.current = false;
    setShowLogoutWarning(false);
  };

  const handleLogout = () => {
    if (onSignOut) onSignOut();
  };

  const stayLoggedIn = () => {
    resetActivity();
  };

  // Load and realtime effects
  useEffect(() => {
    (async () => {
      let init = null;
      try {
        const { data, error } = await supabase.from("budgets").select("state").eq("id", "family").maybeSingle();
        if (!error && data && data.state) init = data.state;
      } catch (e) { /* no row */ }
      setState(init || { ...structuredClone(BASELINE), entries: [] });
      setLoaded(true);

      try {
        const a = await window.loadArchives();
        setArchives(a || []);
      } catch (e) { /* ignore */ }
    })();
  }, []);

  // Save effect
  useEffect(() => {
    if (!state || !loaded) return;
    const t = setTimeout(async () => {
      try {
        const { error } = await supabase.from("budgets").upsert(
          { id: "family", state, updated_at: new Date().toISOString(), updated_by: (await supabase.auth.getSession()).data?.session?.user?.id },
          { onConflict: "id" }
        );
        if (!error) setSaved(true);
      } catch (e) { /* ignore */ }
    }, 600);
    return () => clearTimeout(t);
  }, [state, loaded]);

  // Realtime subscription
  useEffect(() => {
    if (!loaded) return;
    const sub = supabase.on("postgres_changes", { event: "UPDATE", schema: "public", table: "budgets", filter: "id=eq.family" },
      (payload) => {
        if (firstSave.current) { firstSave.current = false; return; }
        if (payload.new?.state) setState(payload.new.state);
      }
    ).subscribe();
    return () => { supabase.removeChannel(sub); };
  }, [loaded]);

  // Inactivity timeout
  useEffect(() => {
    if (!loaded || !window.supabase) return;
    const handleActivity = () => resetActivity();
    const events = ["mousedown", "keydown", "scroll", "touchstart"];
    events.forEach((e) => document.addEventListener(e, handleActivity));
    const interval = setInterval(() => {
      const now = Date.now();
      const elapsed = now - lastActivityRef.current;
      const remaining = INACTIVITY_TIMEOUT - elapsed;
      if (remaining <= 0) {
        clearInterval(interval);
        events.forEach((e) => document.removeEventListener(e, handleActivity));
        handleLogout();
      } else if (remaining <= WARNING_TIME && !warningShownRef.current) {
        warningShownRef.current = true;
        setShowLogoutWarning(true);
        setSecondsLeft(Math.ceil(remaining / 1000));
      } else if (remaining <= WARNING_TIME) {
        setSecondsLeft(Math.ceil(remaining / 1000));
      }
    }, 1000);
    return () => {
      clearInterval(interval);
      events.forEach((e) => document.removeEventListener(e, handleActivity));
    };
  }, [loaded]);

  if (!loaded || !state) return <div className="ap-root"><Styles/><p className="ap-loading">Loading…</p></div>;

  return (
    <div className="ap-root">
      <Styles/>

      {showLogoutWarning && (
        <div className="ap-modal-overlay" onClick={stayLoggedIn}>
          <div className="ap-modal" onClick={(e) => e.stopPropagation()}>
            <h3>Session Timeout</h3>
            <p>You'll be logged out in <b>{secondsLeft} seconds</b> due to inactivity.</p>
            <div className="ap-modal-actions">
              <button className="ap-btn-primary" onClick={stayLoggedIn}>Stay Logged In</button>
              <button className="ap-btn-secondary" onClick={handleLogout}>Log Out Now</button>
            </div>
          </div>
        </div>
      )}

      <header className="ap-header">
        <div className="ap-header-main">
          <h1 className="ap-title">Ramirez Rojas <span className="ap-heart">♥ 💵</span></h1>
          <p className="ap-kicker">Family Budget · {session?.user?.email} <button className="ap-signout" onClick={handleLogout}>Sign out</button></p>
        </div>
      </header>

      <div className="ap-container">
        <div className="ap-month-bar">
          <button className="ap-nav" onClick={() => setMonth(month === 1 ? 12 : month - 1)}>&lt;</button>
          <span className="ap-month">{MLABEL[month-1]} <span className="ap-chevron">◇</span></span>
          <input className="ap-year-input" type="number" value={year} onChange={(e) => setYear(+e.target.value || year)} />
          <button className="ap-nav" onClick={() => setMonth(month === 12 ? 1 : month + 1)}>&gt;</button>
          <button className="ap-today" onClick={() => { setYear(now.getFullYear()); setMonth(now.getMonth()+1); }}>Today</button>
        </div>

        <nav className="ap-tabs">
          {[["dashboard","Dashboard"],["planning","Planning"],["transactions","Tracking"],["year","Year"],["trends","📊 Trends"]].map(([k,l])=>(
            <button key={k} className={tab===k?"on":""} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </nav>

        {tab==="dashboard" && (
          <Dashboard state={state} year={year} month={month} month_key={month_key}
            addEntry={addEntry} deleteEntry={deleteEntry} endYear={endYear}/>
        )}
        {tab==="planning" && (
          <Planning state={state} year={year} month={month} month_key={month_key}
            setPlanAmt={setPlanAmt} addCat={addCat} removeCat={removeCat} renameCat={renameCat}
            copyFrom={copyFrom} resetPlan={resetPlan}
            addBucket={addBucket} renameBucket={renameBucket} deleteBucket={deleteBucket}/>
        )}
        {tab==="transactions" && (
          <Transactions state={state} editEntry={editEntry} deleteEntry={deleteEntry} setBucketForEntry={setBucketForEntry}/>
        )}
        {tab==="year" && (
          <Year state={state} year={year} goMonth={(m) => setMonth(m)}/>
        )}
        {tab==="trends" && (
          <Trends state={state} archives={archives} currentYear={year}/>
        )}
      </div>

      <footer className="ap-foot">auto-save to your shared family budget and sync live across devices</footer>
    </div>
  );
}

/* ================= DASHBOARD ================= */
function Dashboard({ state, year, month, month_key, addEntry, deleteEntry, endYear }) {
  const planAmt = (type, cat) => state.plan[type]?.[cat]?.[month_key] || 0;
  const monthEntries = state.entries.filter((e)=>e.date.slice(0,7)===month_key);
  const expSpent = {};
  monthEntries.filter((e)=>e.type==="Expenses").forEach((e)=>{ expSpent[e.category]=(expSpent[e.category]||0)+e.amount; });

  const envelopes = useMemo(() => {
    const cats = [...new Set([...state.categories.Expenses, ...Object.keys(expSpent)])];
    return cats.map((c)=>({ c, budget: planAmt("Expenses",c), spent: expSpent[c]||0 }))
      .filter((e)=> e.budget>0 || e.spent>0)
      .map((e)=>({ ...e, remaining: e.budget - e.spent }))
      .sort((a,b)=> b.budget-a.budget || b.spent-a.spent);
  }, [state, month_key]);

  const incBudget = state.categories.Income.reduce((a,c)=>a+planAmt("Income",c),0);
  const expBudget = state.categories.Expenses.reduce((a,c)=>a+planAmt("Expenses",c),0);
  const savBudget = state.categories.Savings.reduce((a,c)=>a+planAmt("Savings",c),0);
  const spentTotal = monthEntries.filter((e)=>e.type==="Expenses").reduce((a,e)=>a+e.amount,0);
  const usedPct = expBudget>0 ? (spentTotal/expBudget)*100 : (spentTotal>0?120:0);
  const remaining = expBudget - spentTotal;

  return (
    <>
      <section className="ap-summary">
        <Stat label="Planned income" val={incBudget} color="var(--emerald)"/>
        <Stat label="Budgeted" val={expBudget}/>
        <Stat label="Spent" val={spentTotal} color="var(--clay)"/>
        <Stat label="Left to spend" val={remaining} color={remaining<0?"var(--clay)":"var(--ink)"} hero/>
      </section>

      <div className="ap-overall">
        <div className="ap-overall-top">
          <span>{usedPct.toFixed(0)}% of budget used</span>
          <span className="mono">{fmt(spentTotal)} / {fmt(expBudget)}</span>
        </div>
        <div className="ap-track ap-track-lg">
          <div className="ap-fill" style={{width:Math.min(usedPct,100)+"%", background: usedPct>100?"var(--clay)":usedPct>85?"var(--navy)":"var(--emerald)"}}/>
        </div>
        {savBudget>0 && <div className="ap-note">Plan sets aside <b>{fmt(savBudget)}</b> to savings · unallocated {fmt(incBudget-expBudget-savBudget)}</div>}
        <button className="ap-end-year-btn" onClick={endYear} title="Archive this year and start fresh">End Year {year}</button>
      </div>

      <section className="ap-envelopes">
        <h3>Expense breakdown</h3>
        {envelopes.length > 0 ? envelopes.map((e) => (
          <div key={e.c} className="ap-envelope">
            <div className="ap-env-label">
              <span className="ap-cat-name">{e.c}</span>
              <span className="ap-cat-amounts">{fmt(e.spent)} / {fmt(e.budget)}</span>
            </div>
            <div className="ap-track">
              <div className="ap-fill" style={{width: e.budget>0 ? Math.min((e.spent/e.budget)*100,100)+"%" : "0%", background: e.spent>e.budget?"var(--clay)":e.spent>e.budget*0.85?"var(--navy)":"var(--emerald)"}}/>
            </div>
          </div>
        )) : <p className="ap-empty">No budgeted categories</p>}
      </section>

      <section className="ap-add-entry">
        <h3>Add transaction</h3>
        <EntryForm state={state} month_key={month_key} onAdd={addEntry} month={month}/>
      </section>
    </>
  );
}

function EntryForm({ state, month_key, onAdd, month }) {
  const [type, setType] = useState("Expenses");
  const [cat, setCat] = useState(state.categories[type][0] || "");
  const [amount, setAmount] = useState("");
  const [name, setName] = useState("");
  const [date, setDate] = useState(month_key);
  const [bucket, setBucket] = useState("");

  const cats = state.categories[type] || [];

  return (
    <div className="ap-entry-form">
      <input type="date" value={date} onChange={(e)=>setDate(e.target.value)} className="ap-date-input" />
      <select value={type} onChange={(e)=>{ setType(e.target.value); setCat(state.categories[e.target.value][0]||""); }} className="ap-type-select">
        {TYPES.map((t)=>(<option key={t} value={t}>{t}</option>))}
      </select>
      <select value={cat} onChange={(e)=>setCat(e.target.value)} className="ap-cat-select">
        {cats.map((c)=>(<option key={c} value={c}>{c}</option>))}
      </select>
      <input type="text" placeholder="Merchant (Netflix, Whole Foods...)" value={name} onChange={(e)=>setName(e.target.value)} className="ap-name-input" />
      <input type="number" placeholder="0.00" value={amount} onChange={(e)=>setAmount(e.target.value)} className="ap-amount-input" />
      {type === "Expenses" && (
        <select value={bucket} onChange={(e)=>setBucket(e.target.value)} className="ap-bucket-select">
          <option value="">No bucket</option>
          {Object.keys(state.buckets || {}).map((b)=>(<option key={b} value={b}>{b}</option>))}
        </select>
      )}
      <button className="ap-btn-add" onClick={()=>{ const amt=parseFloat(amount); if(amt>0 && name.trim()){ onAdd(type, date, cat, amt, name.trim()); setAmount(""); setName(""); setBucket(""); } }}>Add</button>
    </div>
  );
}

function Stat({ label, val, color, hero }) {
  return (
    <div className={`ap-stat ${hero?"hero":""}`} style={color ? { "--stat-color": color } : {}}>
      <span className="ap-stat-label">{label}</span>
      <b className="ap-stat-val">{fmt(val)}</b>
    </div>
  );
}

/* ================= PLANNING ================= */
function Planning({ state, year, month, month_key, setPlanAmt, addCat, removeCat, renameCat, copyFrom, resetPlan, addBucket, renameBucket, deleteBucket }) {
  const planAmt = (type, c) => state.plan[type]?.[c]?.[month_key] || 0;
  const total = (type) => state.categories[type].reduce((a,c)=>a+planAmt(type,c),0);
  const toAllocate = total("Income") - total("Expenses") - total("Savings");
  const [srcM, setSrcM] = useState(month===1?12:month-1);
  const [srcY, setSrcY] = useState(month===1?year-1:year);
  useEffect(()=>{ setSrcM(month===1?12:month-1); setSrcY(month===1?year-1:year); }, [month, year]);

  return (
    <section className="ap-plan">
      <div className="ap-plan-bar">
        <div className={"ap-alloc"+(toAllocate===0?" ok":toAllocate<0?" neg":"")}>
          <span>To allocate</span><b>{fmt(toAllocate)}</b>
        </div>
        <div className="ap-plan-actions">
          <div className="ap-copyfrom">
            <span>Copy from</span>
            <select value={srcM} onChange={(e)=>setSrcM(+e.target.value)}>{MLABEL.map((l,i)=>(<option key={l} value={i+1}>{l}</option>))}</select>
            <input className="src-year" type="number" value={srcY} onChange={(e)=>setSrcY(+e.target.value||srcY)}/>
            <button onClick={()=>copyFrom(mk(srcY,srcM))}>Copy</button>
          </div>
          <button className="ghost" onClick={resetPlan}>Reset to original</button>
        </div>
      </div>
      <p className="ap-plan-hint">Editing budget for <b>{MLABEL[month-1]} {month_key.slice(0,4)}</b>.</p>

      <div className="ap-buckets-manager">
        <h3>Manage Buckets</h3>
        <p className="ap-buckets-hint">Create optional buckets to group transactions (e.g., "Subscriptions" for Netflix, Spotify, etc.)</p>
        <div className="ap-buckets-list">
          {Object.keys(state.buckets || {}).map((bname) => (
            <div key={bname} className="ap-bucket-item">
              <input className="ap-bucket-name" value={bname} onChange={(e) => {
                const newName = e.target.value.trim();
                if (newName && newName !== bname) renameBucket(bname, newName);
              }} />
              <span className="ap-bucket-count">{((state.entries || []).filter((e) => e.bucket === bname).length)} items</span>
              <button className="ap-bucket-delete" onClick={() => { if (confirm(`Delete bucket "${bname}"?`)) deleteBucket(bname); }}>Delete</button>
            </div>
          ))}
        </div>
        <div className="ap-add-bucket">
          <input className="ap-bucket-input" type="text" placeholder="New bucket name" onKeyDown={(e) => {
            if (e.key === "Enter") {
              const val = e.target.value.trim();
              if (val && !state.buckets?.[val]) { addBucket(val); e.target.value = ""; }
            }
          }} />
          <button onClick={(e) => {
            const inp = e.target.parentElement.querySelector(".ap-bucket-input");
            const val = inp.value.trim();
            if (val && !state.buckets?.[val]) { addBucket(val); inp.value = ""; }
          }}>+ Add Bucket</button>
        </div>
      </div>

      {TYPES.map((type)=>(<PlanSection key={type} type={type} cats={state.categories[type]} planAmt={(c)=>planAmt(type,c)} total={total(type)} setPlanAmt={(c,v)=>setPlanAmt(type,c,month_key,v)} addCat={(n)=>addCat(type,n)} removeCat={(c)=>removeCat(type,c)} renameCat={(o,n)=>renameCat(type,o,n)}/>))}
    </section>
  );
}

function PlanSection({ type, cats, planAmt, total, setPlanAmt, addCat, removeCat, renameCat }) {
  const [newCat, setNewCat] = useState("");
  const tone = type==="Income"?"emerald":type==="Savings"?"teal":"clay";
  return (
    <div className="ap-plansec">
      <div className={`ap-plansec-head ap-${tone}`}>
        <h3>{type}</h3>
        <b>{fmt(total)}</b>
      </div>
      <div className="ap-plansec-cats">
        {cats.map((c)=>(
          <div key={c} className="ap-plancat">

        <button onClick={()=>{ if(newCat.trim()){ addCat(newCat.trim()); setNewCat(""); } }}>+ Add</button>

/* ================= TRANSACTIONS ================= */

/* ================= YEAR VIEW ================= */
function Year({ state, year, goMonth }) {
  const monthData = useMemo(() => {
    const data = [];
    MLABEL.forEach((_, m) => {
      const mk_val = mk(year, m+1);
      const entries = state.entries.filter((e) => e.date.slice(0,7) === mk_val && e.type === "Expenses");
      const spent = entries.reduce((a,e)=>a+e.amount,0);
      const budgeted = state.categories.Expenses.reduce((a,c)=>a+(state.plan.Expenses?.[c]?.[mk_val]||0),0);
      data.push({ month: m+1, spent, budgeted, remaining: budgeted - spent });
    });
    return data;
  }, [state, year]);

  return (
    <section className="ap-year">
      <h3>{year} Overview</h3>
      <div className="ap-year-chart">
        <svg viewBox="0 0 500 300" preserveAspectRatio="xMidYMid meet">
          <g>{monthData.map((d,i)=>{ const x=30+i*37; const y_budget=250-(d.budgeted/5000)*200; const y_spent=250-(d.spent/5000)*200; return (<g key={i}><rect x={x-8} y={y_spent} width="7" height={250-y_spent} fill="var(--clay)" opacity="0.7"/><rect x={x-1} y={y_budget} width="7" height={250-y_budget} fill="var(--navy)" opacity="0.5"/><text x={x} y="270" fontSize="10" textAnchor="middle">{MLABEL[i].slice(0,1)}</text></g>); })}</g>
        </svg>
      </div>
      <div className="ap-year-table">
        <table>
          <thead><tr><th>Month</th><th className="r">Budgeted</th><th className="r">Spent</th><th className="r">Remaining</th></tr></thead>
          <tbody>{monthData.map((d)=>(<tr key={d.month} onClick={()=>goMonth(d.month)} style={{cursor:"pointer"}}><td>{MLABEL[d.month-1]}</td><td className="r mono">{fmt(d.budgeted)}</td><td className="r mono">{fmt(d.spent)}</td><td className="r mono" style={{color: d.remaining<0?"var(--clay)":"var(--emerald)"}}>{fmt(d.remaining)}</td></tr>))}</tbody>
        </table>
      </div>
    </section>
  );
}

/* ================= TRENDS ================= */
function Trends({ state, archives, currentYear }) {
  const [selectedCats, setSelectedCats] = useState(["Groceries"]);
  const [viewMode, setViewMode] = useState("bucket"); // bucket or individual

  const allYears = useMemo(() => {
    const years = [];
    const yearMap = {};
    (archives || []).forEach((a) => {
      if (a.year && a.state) { yearMap[a.year] = a.state; years.push(a.year); }
    });
    yearMap[currentYear] = state;
    years.push(currentYear);
    return { years: years.sort((a,b)=>a-b), yearMap };
  }, [archives, state, currentYear]);

  const expenseCategories = state.categories.Expenses || [];

  const trendData = useMemo(() => {
    const result = {};
    selectedCats.forEach((cat) => {
      result[cat] = {};
      allYears.years.forEach((yr) => {
        const yearState = allYears.yearMap[yr];
        if (yearState) {
          const entries = (yearState.entries || []).filter((e) => e.type === "Expenses" && e.category === cat && e.date.slice(0, 4) === String(yr));
          const total = entries.reduce((a, e) => a + e.amount, 0);
          result[cat][yr] = total;
        } else {
          result[cat][yr] = 0;
        }
      });
    });
    return result;
  }, [selectedCats, allYears]);

  const colors = ["var(--clay)", "var(--teal)", "var(--navy)", "var(--emerald)"];

  return (
    <section className="ap-trends">
      <div className="ap-trends-head">
        <h2 className="ap-trends-title">Spending Trends</h2>
        <div className="ap-trend-opts">
          <label>Compare categories:</label>
          <select multiple value={selectedCats} onChange={(e) => {
            const opts = Array.from(e.target.selectedOptions, (o) => o.value);
            setSelectedCats(opts.length > 0 ? opts : ["Groceries"]);
          }} className="ap-multiselect">
            {expenseCategories.map((c) => (<option key={c} value={c}>{c}</option>))}
          </select>
        </div>
      </div>

      {allYears.years.length > 1 ? (
        <>
          <div className="ap-trend-chart">
            <svg viewBox={`0 0 ${50 + allYears.years.length * 80} 300`} preserveAspectRatio="xMidYMid meet">
              {[0, 1000, 2000, 3000, 4000, 5000].map((val) => {
                const y = 250 - (val / 5000) * 200;
                return (
                  <g key={`grid-${val}`}>
                    <line x1="40" y1={y} x2={40 + allYears.years.length * 80} y2={y} stroke="var(--line)" strokeWidth="0.5" opacity="0.5" />
                    <text x="35" y={y + 4} fontSize="10" fill="var(--ink-soft)" textAnchor="end">${Math.round(val / 100)}</text>
                  </g>
                );
              })}

              {selectedCats.map((cat, catIdx) => {
                const points = allYears.years.map((yr, i) => {
                  const val = trendData[cat]?.[yr] || 0;
                  const x = 50 + i * 80;
                  const y = 250 - (val / 5000) * 200;
                  return `${x},${y}`;
                }).join(" ");
                return (
                  <g key={`line-${cat}`}>
                    <polyline points={points} fill="none" stroke={colors[catIdx % colors.length]} strokeWidth="2.5" vectorEffect="non-scaling-stroke" />
                    {allYears.years.map((yr, i) => {
                      const val = trendData[cat]?.[yr] || 0;
                      const x = 50 + i * 80;
                      const y = 250 - (val / 5000) * 200;
                      return (<circle key={`dot-${cat}-${yr}`} cx={x} cy={y} r="3" fill={colors[catIdx % colors.length]} opacity="0.7" />);
                    })}
                  </g>
                );
              })}

              <line x1="40" y1="250" x2={40 + allYears.years.length * 80} y2="250" stroke="var(--line)" strokeWidth="1.5" />
              {allYears.years.map((yr, i) => {
                const x = 50 + i * 80;
                return (
                  <g key={`year-${yr}`}>
                    <line x1={x} y1="250" x2={x} y2="258" stroke="var(--line)" strokeWidth="1" />
                    <text x={x} y="275" fontSize="12" fill="var(--ink-soft)" textAnchor="middle">{yr}</text>
                  </g>
                );
              })}
            </svg>
          </div>

          <div className="ap-trend-legend">
            {selectedCats.map((cat, idx) => (<span key={cat}><i style={{background: colors[idx % colors.length]}} />{cat}</span>))}
          </div>

          <div className="ap-trend-table">
            <table>
              <thead>
                <tr>
                  <th>Category</th>
                  {allYears.years.map((yr) => (<th key={yr} className="r">{yr}</th>))}
                  {allYears.years.length > 1 && <th className="r">Change</th>}
                  {allYears.years.length > 1 && <th className="r">% Change</th>}
                </tr>
              </thead>
              <tbody>
                {selectedCats.map((cat) => {
                  const vals = allYears.years.map((yr) => trendData[cat]?.[yr] || 0);
                  const lastVal = vals[vals.length - 1];
                  const prevVal = vals[vals.length - 2] || 0;
                  const change = lastVal - prevVal;
                  const pctChange = prevVal > 0 ? ((change / prevVal) * 100) : 0;
                  return (
                    <tr key={cat}>
                      <td className="cat-name">{cat}</td>
                      {vals.map((v, i) => (<td key={allYears.years[i]} className="r mono">{fmt(v)}</td>))}
                      {allYears.years.length > 1 && <td className="r mono" style={{color: change >= 0 ? "var(--clay)" : "var(--emerald)"}}>{(change >= 0 ? "+" : "")}{fmt(change)}</td>}
                      {allYears.years.length > 1 && <td className="r mono" style={{color: pctChange >= 0 ? "var(--clay)" : "var(--emerald)"}}>{(pctChange >= 0 ? "+" : "")}{pctChange.toFixed(1)}%</td>}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      ) : (
        <p className="ap-empty">Archive previous years to see trends. Click "End Year" in the Dashboard.</p>
      )}
    </section>
  );
}

.ap-btn-secondary {font-family:'Archivo';font-weight:600;font-size:13px;background:var(--paper);color:var(--ink);border:1.5px solid var(--line);border-radius:8px;padding:10px 16px;cursor:pointer;}

.ap-loading {text-align:center;padding:40px;color:var(--ink-soft);}

/* ---- Auth Gate & Root ---- */
function Root() {
  const [session, setSession] = React.useState(null);
  const [checked, setChecked] = React.useState(false);

  React.useEffect(() => {
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      setSession(session);
      const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => setSession(session));
      setChecked(true);
      return () => subscription.unsubscribe();
    })();
  }, []);

  if (!checked) return <div style={{textAlign:"center", padding:"40px", color:"#5E6675"}}>Loading...</div>;

  if (!session) {
    return <AuthScreen supabase={supabase} />;
  }

  const email = session.user.email.toLowerCase();
  if (!ALLOWED.includes(email)) {
    return (
      <div style={{padding:"40px", textAlign:"center", color:"#1B2230", fontFamily:"Archivo,-apple-system,sans-serif"}}>
        <p style={{fontSize:"18px", fontWeight:"600", marginBottom:"12px"}}>Access Restricted</p>
        <p style={{color:"#5E6675", marginBottom:"24px"}}>This account isn't authorized.</p>
        <button onClick={() => supabase.auth.signOut()} style={{background:"#B23A2E", color:"white", border:"none", padding:"10px 20px", borderRadius:"8px", cursor:"pointer", fontWeight:"600"}}>Sign Out</button>
      </div>
    );
  }

  return <App supabase={supabase} session={session} onSignOut={() => supabase.auth.signOut()} />;
}

function AuthScreen({ supabase }) {
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [isSignUp, setIsSignUp] = React.useState(false);
  const [error, setError] = React.useState("");

  const handleAuth = async () => {
    setError("");
    setLoading(true);
    try {
      if (isSignUp) {
        const { error: e } = await supabase.auth.signUp({ email, password });
        if (e) setError(e.message);
      } else {
        const { error: e } = await supabase.auth.signInWithPassword({ email, password });
        if (e) setError(e.message);
      }
    } catch (e) {
      setError(e.message);
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh", background:"#EDEFF3", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Archivo,-apple-system,sans-serif"}}>
      <div style={{background:"#FAFBFC", border:"1.5px solid #D5DAE2", borderRadius:"13px", padding:"40px", maxWidth:"360px", width:"90%"}}>
        <h2 style={{fontFamily:"Fraunces,serif", fontSize:"24px", marginBottom:"8px"}}>Ramirez Rojas ♥ 💵</h2>
        <p style={{color:"#5E6675", marginBottom:"24px", fontSize:"13px"}}>Family Budget</p>
        <input type="email" placeholder="Email" value={email} onChange={(e) => setEmail(e.target.value)} style={{width:"100%", padding:"10px", marginBottom:"12px", border:"1.5px solid #D5DAE2", borderRadius:"8px", fontFamily:"inherit", boxSizing:"border-box"}} />
        <input type="password" placeholder="Password" value={password} onChange={(e) => setPassword(e.target.value)} style={{width:"100%", padding:"10px", marginBottom:"16px", border:"1.5px solid #D5DAE2", borderRadius:"8px", fontFamily:"inherit", boxSizing:"border-box"}} />
        {error && <p style={{color:"#B23A2E", fontSize:"12px", marginBottom:"12px"}}>{error}</p>}
        <button onClick={handleAuth} disabled={loading} style={{width:"100%", padding:"12px", background:"#23456E", color:"white", border:"none", borderRadius:"8px", fontWeight:"600", cursor:"pointer", marginBottom:"12px"}}>
          {loading ? "..." : (isSignUp ? "Sign Up" : "Log In")}
        </button>
        <button onClick={() => setIsSignUp(!isSignUp)} style={{width:"100%", padding:"12px", background:"none", color:"#23456E", border:"1.5px solid #D5DAE2", borderRadius:"8px", fontWeight:"600", cursor:"pointer"}}>
          {isSignUp ? "Already have account?" : "Create account"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
  </script>
</body>
