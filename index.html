<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect, useMemo, useRef } = React;
const Papa = window.Papa;
const { createClient } = window.supabase;

const SUPABASE_URL = "https://yjgeakxdhgjhzstvmziq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_9SIlkXrWdAW_ircXhZ_bCg_APPKieBA";
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const ALLOWED = ["maoramirezaragon@gmail.com", "irojascantor@gmail.com"];


const BASELINE = {"categories": {"Income": ["Salary Mao", "Salary Ingrid", "Primas Ingrid", "Other"], "Expenses": ["House Mortgage", "Cell phones", "Pepco", "Water", "Amazon Prime", "Disney+", "Netflix", "Sofa", "Apple Care Ipad y Celular Mao", "Car Insurance", "Verizon", "Peloton Monthly subscription", "Metro", "Gas", "Groceries", "Restaurants and fun", "Shopping", "Carro", "Mantenimiento casa", "Futbol Luca", "Lavado carro", "Pelo Ingrid", "Comedor"], "Savings": ["Ahorro Ingrid", "Ahorro Mao"]}, "plan": {"Income": {"Salary Mao": {"2024-06": 4700, "2024-07": 4700, "2024-08": 4700, "2024-09": 4700, "2024-10": 4700, "2024-11": 4700, "2024-12": 4700}, "Salary Ingrid": {"2024-06": 4870, "2024-07": 4870, "2024-08": 4870, "2024-09": 4870, "2024-10": 4870, "2024-11": 4870, "2024-12": 4870}, "Primas Ingrid": {"2024-07": 1000, "2024-12": 2300}, "Other": {}}, "Expenses": {"House Mortgage": {"2024-06": 4050, "2024-07": 4050, "2024-08": 4050, "2024-09": 4050, "2024-10": 4050, "2024-11": 4050, "2024-12": 4050}, "Cell phones": {"2024-06": 86, "2024-07": 86, "2024-08": 86, "2024-09": 86, "2024-10": 86, "2024-11": 86, "2024-12": 86}, "Pepco": {"2024-06": 180, "2024-07": 190, "2024-08": 190, "2024-09": 180, "2024-10": 170, "2024-11": 190, "2024-12": 200}, "Water": {"2024-06": 200, "2024-08": 200, "2024-10": 200, "2024-12": 200}, "Amazon Prime": {"2024-06": 15, "2024-07": 15, "2024-08": 15, "2024-09": 15, "2024-10": 15, "2024-11": 15, "2024-12": 15}, "Disney+": {"2024-06": 20, "2024-07": 20, "2024-08": 20, "2024-09": 20, "2024-10": 20, "2024-11": 20, "2024-12": 20}, "Netflix": {"2024-06": 10, "2024-07": 10, "2024-08": 10, "2024-09": 10, "2024-10": 10, "2024-11": 10, "2024-12": 10}, "Sofa": {"2024-06": 1410, "2024-07": 1450, "2024-08": 1450, "2024-09": 950}, "Apple Care Ipad y Celular Mao": {"2024-06": 22, "2024-07": 22, "2024-08": 22, "2024-09": 22, "2024-10": 22, "2024-11": 22, "2024-12": 22}, "Car Insurance": {"2024-06": 207, "2024-07": 207, "2024-08": 207, "2024-09": 207, "2024-10": 207, "2024-11": 207, "2024-12": 207}, "Verizon": {"2024-06": 90, "2024-07": 90, "2024-08": 90, "2024-09": 90, "2024-10": 90, "2024-11": 90, "2024-12": 90}, "Peloton Monthly subscription": {"2024-06": 47, "2024-07": 47, "2024-08": 47, "2024-09": 47, "2024-10": 47, "2024-11": 47, "2024-12": 47}, "Metro": {"2024-06": 140, "2024-07": 140, "2024-08": 140, "2024-09": 140, "2024-10": 140, "2024-11": 140, "2024-12": 140}, "Gas": {"2024-06": 300, "2024-07": 300, "2024-08": 300, "2024-09": 300, "2024-10": 300, "2024-11": 300, "2024-12": 300}, "Groceries": {"2024-06": 728, "2024-07": 800, "2024-08": 800, "2024-09": 800, "2024-10": 750, "2024-11": 750, "2024-12": 1150}, "Restaurants and fun": {"2024-06": 500, "2024-07": 500, "2024-08": 400, "2024-09": 300, "2024-10": 500, "2024-11": 500, "2024-12": 2000}, "Shopping": {"2024-06": 500, "2024-07": 500, "2024-08": 500, "2024-09": 500, "2024-10": 500, "2024-11": 500, "2024-12": 2000}, "Carro": {"2024-06": 25, "2024-07": 25, "2024-08": 25, "2024-09": 25, "2024-10": 25, "2024-11": 25, "2024-12": 25}, "Mantenimiento casa": {"2024-06": 1000}, "Futbol Luca": {"2024-07": 250, "2024-08": 266, "2024-10": 266, "2024-12": 266}, "Lavado carro": {"2024-06": 40, "2024-07": 40, "2024-08": 40, "2024-09": 40, "2024-10": 40, "2024-11": 40, "2024-12": 40}, "Pelo Ingrid": {"2024-09": 350}, "Comedor": {"2024-10": 2132}}, "Savings": {"Ahorro Ingrid": {"2024-07": 1414, "2024-08": 356, "2024-09": 719, "2024-11": 1289, "2024-12": 502}, "Ahorro Mao": {"2024-07": 414, "2024-08": 356, "2024-09": 719, "2024-11": 1289, "2024-12": 500}}}};
const STORE_KEY = "familybudget:app:v2";
const TYPES = ["Income", "Expenses", "Savings"];

const MLABEL = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const pad = (n) => String(n).padStart(2, "0");
const mk = (y, m) => `${y}-${pad(m)}`;
const fmt = (n) => (n<0?"-":"") + "$" + Math.abs(Math.round(n)).toLocaleString("en-US");
const fmt2 = (n) => (n<0?"-":"") + "$" + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const uid = () => (window.crypto?.randomUUID?.() || String(Date.now()+Math.random()));

function App({ supabase, session, onSignOut }) {
  const [state, setState] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [saved, setSaved] = useState(false);
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth()+1); // 1-12
  const [tab, setTab] = useState("dashboard");
  const firstSave = useRef(true);

  /* ---- load from Supabase ---- */
  useEffect(() => {
    (async () => {
      let init = null;
      try {
        const { data, error } = await supabase
          .from("budgets").select("state").eq("id", "family").maybeSingle();
        if (!error && data && data.state) init = data.state;
      } catch (e) { /* no row yet */ }
      setState(init || { ...structuredClone(BASELINE), entries: [] });
      setLoaded(true);
    })();
  }, []);

  /* ---- debounced persist to Supabase ---- */
  useEffect(() => {
    if (!loaded || !state) return;
    if (firstSave.current) { firstSave.current = false; return; }
    const t = setTimeout(async () => {
      try {
        const { error } = await supabase.from("budgets").upsert(
          { id: "family", state, updated_at: new Date().toISOString(), updated_by: session.user.id },
          { onConflict: "id" }
        );
        if (!error) { setSaved(true); setTimeout(()=>setSaved(false), 1200); }
      } catch (e) { /* ignore */ }
    }, 600);
    return () => clearTimeout(t);
  }, [state, loaded]);

  /* ---- live sync: pull in changes other family members make ---- */
  useEffect(() => {
    const ch = supabase.channel("budget-sync")
      .on("postgres_changes",
        { event: "*", schema: "public", table: "budgets", filter: "id=eq.family" },
        (payload) => {
          const row = payload.new;
          if (!row || !row.state) return;
          if (row.updated_by === session.user.id) return; // ignore our own writes
          firstSave.current = true;                        // don't echo it back
          setState(row.state);
        })
      .subscribe();
    return () => { try { supabase.removeChannel(ch); } catch (e) {} };
  }, []);

  const month_key = mk(year, month);
  const update = (fn) => setState((prev) => { const next = structuredClone(prev); fn(next); return next; });

  /* ---- mutations ---- */
  const setPlanAmt = (type, cat, key, amt) => update((s) => {
    s.plan[type] = s.plan[type] || {}; s.plan[type][cat] = s.plan[type][cat] || {};
    if (amt && amt > 0) s.plan[type][cat][key] = amt; else delete s.plan[type][cat][key];
  });
  const addCat = (type, name) => update((s) => {
    name = (name||"").trim(); if (!name || s.categories[type].includes(name)) return;
    s.categories[type].push(name); s.plan[type] = s.plan[type]||{}; s.plan[type][name] = {};
  });
  const removeCat = (type, cat) => update((s) => {
    s.categories[type] = s.categories[type].filter((c)=>c!==cat);
    if (s.plan[type]) delete s.plan[type][cat];
  });
  const renameCat = (type, oldN, newN) => update((s) => {
    newN = (newN||"").trim(); if (!newN || oldN===newN || s.categories[type].includes(newN)) return;
    s.categories[type] = s.categories[type].map((c)=>c===oldN?newN:c);
    if (s.plan[type]?.[oldN]) { s.plan[type][newN] = {...s.plan[type][oldN]}; delete s.plan[type][oldN]; }
    s.entries = s.entries.map((e)=> e.type===type&&e.category===oldN ? {...e, category:newN} : e);
  });
  const copyFrom = (srcKey) => update((s) => {
    TYPES.forEach((type)=> s.categories[type].forEach((c)=>{
      const v = s.plan[type]?.[c]?.[srcKey];
      s.plan[type]=s.plan[type]||{}; s.plan[type][c]=s.plan[type][c]||{};
      if (v) s.plan[type][c][month_key] = v;
    }));
  });
  const resetPlan = () => { if (!confirm("Reset all categories and budget amounts to the original plan? Your logged transactions are kept.")) return;
    update((s)=>{ s.categories = structuredClone(BASELINE.categories); s.plan = structuredClone(BASELINE.plan); }); };
  const addEntry = (e) => update((s)=> s.entries.unshift(e));
  const editEntry = (id, patch) => update((s)=> { s.entries = s.entries.map((x)=>x.id===id?{...x,...patch}:x); });
  const deleteEntry = (id) => update((s)=> { s.entries = s.entries.filter((x)=>x.id!==id); });
  const importTxns = (rows) => update((s)=> {
    rows.forEach((r)=>{ if (!s.categories[r.type].includes(r.category)) s.categories[r.type].push(r.category); s.entries.unshift(r); });
  });

  const stepMonth = (d) => { let m=month+d, y=year; if(m<1){m=12;y--;} if(m>12){m=1;y++;} setMonth(m); setYear(y); };

  if (!loaded || !state) return <div className="ap-root"><Styles/><p className="ap-loading">Loading…</p></div>;

  return (
    <div className="ap-root">
      <Styles/>
      <div className="ap-wrap">
        <header className="ap-head">
          <div>
            <div className="ap-kicker">Family Budget · <span className="ap-user">{session.user.email}</span> · <button className="ap-signout" onClick={onSignOut}>Sign out</button></div>
            <h1 className="ap-title">Ramirez Rojas<span className="ap-heart">♥</span><span className="ap-bill">💵</span></h1>
          </div>
          <div className="ap-periodbox">
            {saved && <span className="ap-saved">✓ saved</span>}
            <div className="ap-period">
              <button className="ap-arrow" onClick={()=>stepMonth(-1)} aria-label="Previous month">‹</button>
              <select value={month} onChange={(e)=>setMonth(+e.target.value)}>
                {MLABEL.map((l,i)=>(<option key={l} value={i+1}>{l}</option>))}
              </select>
              <input className="ap-year" type="number" value={year} onChange={(e)=>setYear(+e.target.value||year)} />
              <button className="ap-arrow" onClick={()=>stepMonth(1)} aria-label="Next month">›</button>
              <button className="ap-todaybtn" onClick={()=>{ const d=new Date(); setYear(d.getFullYear()); setMonth(d.getMonth()+1); }} title="Jump to current month">Today</button>
            </div>
          </div>
        </header>

        <nav className="ap-tabs">
          {[["dashboard","Dashboard"],["planning","Planning"],["transactions","Tracking"],["year","Year"]].map(([k,l])=>(
            <button key={k} className={tab===k?"on":""} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </nav>

        {tab==="dashboard" && (
          <Dashboard state={state} year={year} month={month} month_key={month_key}
            addEntry={addEntry} deleteEntry={deleteEntry}/>
        )}
        {tab==="planning" && (
          <Planning state={state} year={year} month={month} month_key={month_key}
            setPlanAmt={setPlanAmt} addCat={addCat} removeCat={removeCat} renameCat={renameCat}
            copyFrom={copyFrom} resetPlan={resetPlan}/>
        )}
        {tab==="year" && (
          <Year state={state} year={year} goMonth={(m)=>{ setMonth(m); setTab("dashboard"); }}/>
        )}
        {tab==="transactions" && (
          <Transactions state={state} editEntry={editEntry} deleteEntry={deleteEntry} importTxns={importTxns}/>
        )}

        <footer className="ap-foot">
          Plan & transactions auto-save to your shared family budget and sync live across devices · {state.entries.length} records logged.
        </footer>
      </div>
    </div>
  );
}

/* ================= DASHBOARD ================= */
function Dashboard({ state, year, month, month_key, addEntry, deleteEntry }) {
  const planAmt = (type, cat) => state.plan[type]?.[cat]?.[month_key] || 0;
  const monthEntries = state.entries.filter((e)=>e.date.slice(0,7)===month_key);
  const spentBy = (type) => { const o={}; monthEntries.filter((e)=>e.type===type).forEach((e)=>o[e.category]=(o[e.category]||0)+e.amount); return o; };

  const expSpent = spentBy("Expenses");
  const envelopes = useMemo(() => {
    const cats = [...new Set([...state.categories.Expenses, ...Object.keys(expSpent)])];
    return cats.map((c)=>({ c, budget: planAmt("Expenses",c), spent: expSpent[c]||0 }))
      .filter((e)=> e.budget>0 || e.spent>0)
      .map((e)=>({ ...e, remaining: e.budget - e.spent }))
      .sort((a,b)=> b.budget-a.budget || b.spent-a.spent);
  }, [state, month_key]);

  const incBudget = state.categories.Income.reduce((a,c)=>a+planAmt("Income",c),0);
  const expBudget = state.categories.Expenses.reduce((a,c)=>a+planAmt("Expenses",c),0);
  const savBudget = state.categories.Savings.reduce((a,c)=>a+planAmt("Savings",c),0);
  const spentTotal = monthEntries.filter((e)=>e.type==="Expenses").reduce((a,e)=>a+e.amount,0);
  const usedPct = expBudget>0 ? (spentTotal/expBudget)*100 : (spentTotal>0?120:0);
  const remaining = expBudget - spentTotal;

  return (
    <>
      <section className="ap-summary">
        <Stat label="Planned income" val={incBudget} color="var(--emerald)"/>
        <Stat label="Budgeted" val={expBudget}/>
        <Stat label="Spent" val={spentTotal} color="var(--clay)"/>
        <Stat label="Left to spend" val={remaining} color={remaining<0?"var(--clay)":"var(--ink)"} hero/>
      </section>

      <div className="ap-overall">
        <div className="ap-overall-top">
          <span>{usedPct.toFixed(0)}% of budget used</span>
          <span className="mono">{fmt(spentTotal)} / {fmt(expBudget)}</span>
        </div>
        <div className="ap-track ap-track-lg">
          <div className="ap-fill" style={{width:Math.min(usedPct,100)+"%",
            background: usedPct>100?"var(--clay)":usedPct>85?"var(--navy)":"var(--emerald)"}}/>
        </div>
        {savBudget>0 && <div className="ap-note">Plan sets aside <b>{fmt(savBudget)}</b> to savings · unallocated {fmt(incBudget-expBudget-savBudget)}</div>}
      </div>

      <AddBar state={state} month_key={month_key} addEntry={addEntry}/>

      <section className="ap-env-grid">
        {envelopes.map((e)=>(
          <Envelope key={e.c} env={e}
            items={monthEntries.filter((x)=>x.type==="Expenses"&&x.category===e.c)}
            month_key={month_key} addEntry={addEntry}
            onDelete={deleteEntry}/>
        ))}
        {envelopes.length===0 && <p className="ap-loading">No expense budget or spending for {MLABEL[month-1]} {year}. Set one in Planning.</p>}
      </section>

      <MiniPanel title="Savings" rows={state.categories.Savings} planAmt={(c)=>planAmt("Savings",c)} spent={spentBy("Savings")} accent="teal" verb="saved"/>
      <MiniPanel title="Income received" rows={state.categories.Income} planAmt={(c)=>planAmt("Income",c)} spent={spentBy("Income")} accent="emerald" verb="received"/>
    </>
  );
}

function Stat({ label, val, color, hero }) {
  return (
    <div className={"ap-stat"+(hero?" hero":"")}>
      <span className="lbl">{label}</span>
      <span className="val" style={color&&!hero?{color}:undefined}>{fmt(val)}</span>
    </div>
  );
}

function Envelope({ env, items, month_key, addEntry, onDelete }) {
  const [open, setOpen] = useState(false);
  const [adding, setAdding] = useState(false);
  const [amt, setAmt] = useState("");
  const [note, setNote] = useState("");
  const pct = env.budget>0 ? (env.spent/env.budget)*100 : (env.spent>0?120:0);
  const over = env.budget>0 && env.spent>env.budget;
  const color = over ? "var(--clay)" : pct>85 ? "var(--navy)" : "var(--emerald)";
  const todayISO = new Date().toISOString().slice(0,10);
  const defDate = todayISO.slice(0,7)===month_key ? todayISO : month_key + "-01";
  const submit = () => {
    const a = parseFloat(amt); if (!a || a<=0) return;
    addEntry({ id: uid(), date: defDate, type:"Expenses", category: env.c, amount: Math.round(a*100)/100, note: note.trim() });
    setAmt(""); setNote(""); setAdding(false);
  };
  return (
    <div className={"ap-env"+(over?" over":"")}>
      <div className="ap-env-top">
        <span className="ap-env-name" onClick={()=>items.length&&setOpen(!open)} style={{cursor:items.length?"pointer":"default"}}>
          {env.c}{items.length>0 && <em className="ap-cnt">{items.length}</em>}</span>
        <span className="ap-env-rem" style={{color: over?"var(--clay)":"var(--ink-soft)"}}>
          {env.budget>0 ? (over?fmt(Math.abs(env.remaining))+" over":fmt(env.remaining)+" left") : "unbudgeted"}
        </span>
      </div>
      <div className="ap-track"><div className="ap-fill" style={{width:Math.min(pct,100)+"%",background:color}}/></div>
      <div className="ap-env-foot">
        <span className="mono">{fmt(env.spent)} <span className="dim">{env.budget>0?"of "+fmt(env.budget):"no budget"}</span></span>
        <button className="ap-envadd" onClick={()=>setAdding(!adding)}>{adding?"Cancel":"+ Add"}</button>
      </div>
      {adding && (
        <div className="ap-envform">
          <span className="cur">$</span>
          <input className="amt" type="number" autoFocus placeholder="0.00" value={amt}
            onChange={(e)=>setAmt(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()}/>
          <input className="note" type="text" placeholder="note (optional)" value={note}
            onChange={(e)=>setNote(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()}/>
          <button className="ap-envgo" onClick={submit}>Log</button>
        </div>
      )}
      {open && (
        <ul className="ap-env-items">
          {items.map((x)=>(
            <li key={x.id}><span className="d">{x.date.slice(8)}</span>
              <span className="n">{x.note||"—"}</span>
              <span className="a mono">{fmt2(x.amount)}</span>
              <button className="x" onClick={()=>onDelete(x.id)} title="Delete">×</button></li>
          ))}
        </ul>
      )}
    </div>
  );
}

function MiniPanel({ title, rows, planAmt, spent, accent, verb }) {
  const list = [...new Set([...rows, ...Object.keys(spent)])].filter((c)=> planAmt(c)>0 || (spent[c]||0)>0);
  if (list.length===0) return null;
  return (
    <section className="ap-mini">
      <h3 className="ap-mini-t">{title}</h3>
      <div className="ap-mini-rows">
        {list.map((c)=>{
          const target = planAmt(c), got = spent[c]||0;
          const pct = target>0 ? Math.min((got/target)*100,100) : (got>0?100:0);
          return (<div key={c} className="ap-mini-row">
            <span className="nm">{c}</span>
            <div className="ap-track ap-track-sm"><div className="ap-fill" style={{width:pct+"%",background:`var(--${accent})`}}/></div>
            <span className="mono vl">{fmt(got)} <span className="dim">{target>0?"/ "+fmt(target):verb}</span></span>
          </div>);
        })}
      </div>
    </section>
  );
}

function AddBar({ state, month_key, addEntry }) {
  const [type, setType] = useState("Expenses");
  const [category, setCategory] = useState(state.categories.Expenses[0] || "");
  const todayISO = new Date().toISOString().slice(0,10);
  const dflt = () => todayISO.slice(0,7)===month_key ? todayISO : month_key + "-01";
  const [date, setDate] = useState(dflt());
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  useEffect(()=>{ setDate(dflt()); }, [month_key]);
  const cats = state.categories[type] || [];
  useEffect(()=>{ if (!cats.includes(category)) setCategory(cats[0]||""); }, [type]); // eslint-disable-line

  const add = () => {
    const amt = parseFloat(amount); if (!amt || amt<=0 || !category) return;
    addEntry({ id: uid(), date, type, category, amount: Math.round(amt*100)/100, note: note.trim() });
    setAmount(""); setNote("");
  };
  return (
    <div className="ap-addbar">
      <span className="ap-add-lbl">Log</span>
      <select value={type} onChange={(e)=>setType(e.target.value)}>
        {TYPES.map((t)=>(<option key={t}>{t}</option>))}
      </select>
      <select className="wide" value={category} onChange={(e)=>setCategory(e.target.value)}>
        {cats.map((c)=>(<option key={c}>{c}</option>))}
      </select>
      <input type="date" value={date} onChange={(e)=>setDate(e.target.value)}/>
      <input className="amt" type="number" placeholder="0.00" value={amount}
        onChange={(e)=>setAmount(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&add()}/>
      <input className="note" type="text" placeholder="note (optional)" value={note}
        onChange={(e)=>setNote(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&add()}/>
      <button className="ap-addbtn" onClick={add}>Add</button>
    </div>
  );
}

/* ================= PLANNING ================= */
function Planning({ state, year, month, month_key, setPlanAmt, addCat, removeCat, renameCat, copyFrom, resetPlan }) {
  const planAmt = (type, c) => state.plan[type]?.[c]?.[month_key] || 0;
  const total = (type) => state.categories[type].reduce((a,c)=>a+planAmt(type,c),0);
  const toAllocate = total("Income") - total("Expenses") - total("Savings");
  const [srcM, setSrcM] = useState(month===1?12:month-1);
  const [srcY, setSrcY] = useState(month===1?year-1:year);
  useEffect(()=>{ setSrcM(month===1?12:month-1); setSrcY(month===1?year-1:year); }, [month, year]);

  return (
    <section className="ap-plan">
      <div className="ap-plan-bar">
        <div className={"ap-alloc"+(toAllocate===0?" ok":toAllocate<0?" neg":"")}>
          <span>To allocate</span><b>{fmt(toAllocate)}</b>
        </div>
        <div className="ap-plan-actions">
          <div className="ap-copyfrom">
            <span>Copy from</span>
            <select value={srcM} onChange={(e)=>setSrcM(+e.target.value)}>
              {MLABEL.map((l,i)=>(<option key={l} value={i+1}>{l}</option>))}
            </select>
            <input className="src-year" type="number" value={srcY} onChange={(e)=>setSrcY(+e.target.value||srcY)}/>
            <button onClick={()=>copyFrom(mk(srcY,srcM))}>Copy</button>
          </div>
          <button className="ghost" onClick={resetPlan}>Reset to original</button>
        </div>
      </div>
      <p className="ap-plan-hint">Editing budget for <b>{MLABEL[month-1]} {month_key.slice(0,4)}</b>. Aim to bring “To allocate” to $0 (zero-based budgeting).</p>

      {TYPES.map((type)=>(
        <PlanSection key={type} type={type} cats={state.categories[type]} planAmt={(c)=>planAmt(type,c)}
          total={total(type)} setPlanAmt={(c,v)=>setPlanAmt(type,c,month_key,v)}
          addCat={(n)=>addCat(type,n)} removeCat={(c)=>removeCat(type,c)} renameCat={(o,n)=>renameCat(type,o,n)}/>
      ))}
    </section>
  );
}

function PlanSection({ type, cats, planAmt, total, setPlanAmt, addCat, removeCat, renameCat }) {
  const [newCat, setNewCat] = useState("");
  const tone = type==="Income"?"emerald":type==="Savings"?"teal":"clay";
  return (
    <div className="ap-plansec">
      <div className="ap-plansec-head">
        <h3 style={{color:`var(--${tone})`}}>{type}</h3>
        <span className="mono total">{fmt(total)}</span>
      </div>
      <div className="ap-planrows">
        {cats.map((c)=>(
          <PlanRow key={c} name={c} amount={planAmt(c)}
            onAmount={(v)=>setPlanAmt(c,v)} onRename={(n)=>renameCat(c,n)} onRemove={()=>removeCat(c)}/>
        ))}
        {cats.length===0 && <p className="ap-empty">No categories yet.</p>}
      </div>
      <div className="ap-addcat">
        <input type="text" placeholder={"+ add "+type.toLowerCase().replace(/s$/,"")+" category"} value={newCat}
          onChange={(e)=>setNewCat(e.target.value)}
          onKeyDown={(e)=>{ if(e.key==="Enter"){ addCat(newCat); setNewCat(""); } }}/>
        <button onClick={()=>{ addCat(newCat); setNewCat(""); }}>Add</button>
      </div>
    </div>
  );
}

function PlanRow({ name, amount, onAmount, onRename, onRemove }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(name);
  useEffect(()=>setDraft(name),[name]);
  return (
    <div className="ap-planrow">
      {editing ? (
        <input className="ap-renamein" value={draft} autoFocus
          onChange={(e)=>setDraft(e.target.value)}
          onBlur={()=>{ onRename(draft); setEditing(false); }}
          onKeyDown={(e)=>{ if(e.key==="Enter"){ onRename(draft); setEditing(false);} if(e.key==="Escape"){ setDraft(name); setEditing(false);} }}/>
      ) : (
        <span className="ap-planrow-name" onClick={()=>setEditing(true)} title="Click to rename">{name}</span>
      )}
      <div className="ap-amtwrap">
        <span className="cur">$</span>
        <input type="number" min="0" step="1" value={amount||""} placeholder="0"
          onChange={(e)=>onAmount(parseFloat(e.target.value)||0)}/>
      </div>
      <button className="ap-del" onClick={onRemove} title="Remove category">×</button>
    </div>
  );
}

/* ================= TRANSACTIONS ================= */
function Transactions({ state, editEntry, deleteEntry, importTxns }) {
  const [q, setQ] = useState("");
  const [ftype, setFtype] = useState("All");
  const [fcat, setFcat] = useState("All");
  const [editId, setEditId] = useState(null);
  const [msg, setMsg] = useState("");
  const fileRef = useRef(null);

  const norm = (s)=> (s==null?"":String(s)).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const catOptions = useMemo(()=>{
    const base = ftype==="All"
      ? [...state.categories.Income, ...state.categories.Expenses, ...state.categories.Savings]
      : [...(state.categories[ftype]||[])];
    const fromEntries = state.entries.filter((e)=> ftype==="All"||e.type===ftype).map((e)=>e.category);
    return [...new Set([...base, ...fromEntries])].sort((a,b)=>a.localeCompare(b));
  }, [state, ftype]);

  const nq = norm(q);
  const list = state.entries
    .filter((x)=> ftype==="All" ? true : x.type===ftype)
    .filter((x)=> fcat==="All" ? true : x.category===fcat)
    .filter((x)=> nq==="" ? true : (norm(x.category).includes(nq) || norm(x.note).includes(nq)))
    .slice().sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0);

  const net = list.reduce((a,b)=> b.type==="Income"?a+b.amount:b.type==="Expenses"?a-b.amount:a, 0);
  const allCats = (t) => state.categories[t] || [];

  const exportCsv = () => {
    const rows = state.entries.slice().sort((a,b)=> a.date<b.date?1:-1)
      .map((e)=>({ Date:e.date, Type:e.type, Category:e.category, Amount:e.amount, Note:e.note||"" }));
    const csv = Papa.unparse(rows.length?rows:[{Date:"",Type:"",Category:"",Amount:"",Note:""}]);
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "budget-transactions.csv"; a.click();
  };

  const onFile = (ev) => {
    const f = ev.target.files?.[0]; if (!f) return;
    Papa.parse(f, { header:true, skipEmptyLines:true, complete:(res)=>{
      const valid = []; let skipped = 0;
      res.data.forEach((row)=>{
        const get = (k)=>{ const kk = Object.keys(row).find((x)=>x.toLowerCase().trim()===k); return kk ? String(row[kk]).trim() : ""; };
        const date = get("date"); let type = get("type"); const category = get("category");
        const amount = parseFloat(String(get("amount")).replace(/[$,]/g,"")); const note = get("note");
        type = TYPES.find((t)=>t.toLowerCase()===type.toLowerCase());
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date) || !type || !category || !amount || amount<=0) { skipped++; return; }
        valid.push({ id: uid(), date, type, category, amount: Math.round(amount*100)/100, note });
      });
      if (valid.length) importTxns(valid);
      setMsg(`Imported ${valid.length} record${valid.length===1?"":"s"}${skipped?`, skipped ${skipped} invalid`:""}.`);
      setTimeout(()=>setMsg(""), 5000);
      ev.target.value = "";
    }});
  };

  return (
    <section className="ap-card">
      <div className="ap-filtbar">
        <input className="ap-search" type="text" placeholder="Search category or note…" value={q} onChange={(e)=>setQ(e.target.value)}/>
        <select value={ftype} onChange={(e)=>{ setFtype(e.target.value); setFcat("All"); }}>
          {["All",...TYPES].map((t)=>(<option key={t}>{t}</option>))}
        </select>
        <select value={fcat} onChange={(e)=>setFcat(e.target.value)}>
          <option value="All">All categories</option>
          {catOptions.map((c)=>(<option key={c} value={c}>{c}</option>))}
        </select>
        <button className="ap-iobtn" onClick={exportCsv}>Export CSV</button>
        <button className="ap-iobtn" onClick={()=>fileRef.current?.click()}>Import CSV</button>
        <input ref={fileRef} type="file" accept=".csv,text/csv" style={{display:"none"}} onChange={onFile}/>
        <div className="ap-count">{list.length} records · net <b style={{color:net>=0?"var(--emerald)":"var(--clay)"}}>{fmt(net)}</b></div>
      </div>
      {msg && <div className="ap-importmsg">{msg}</div>}
      <div className="ap-txnscroll">
        <table className="ap-txntable">
          <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Note</th><th className="r">Amount</th><th></th></tr></thead>
          <tbody>
            {list.map((x)=> editId===x.id ? (
              <tr key={x.id} className="editing">
                <td><input type="date" value={x.date} onChange={(e)=>editEntry(x.id,{date:e.target.value})}/></td>
                <td><select value={x.type} onChange={(e)=>{const t=e.target.value; editEntry(x.id,{type:t, category: allCats(t).includes(x.category)?x.category:(allCats(t)[0]||x.category)});}}>
                  {TYPES.map((t)=>(<option key={t}>{t}</option>))}</select></td>
                <td><select value={x.category} onChange={(e)=>editEntry(x.id,{category:e.target.value})}>
                  {[...new Set([...allCats(x.type), x.category])].map((c)=>(<option key={c}>{c}</option>))}</select></td>
                <td><input type="text" value={x.note||""} onChange={(e)=>editEntry(x.id,{note:e.target.value})}/></td>
                <td className="r"><input className="amt" type="number" value={x.amount} onChange={(e)=>editEntry(x.id,{amount:Math.round((parseFloat(e.target.value)||0)*100)/100})}/></td>
                <td><button className="ap-rowbtn done" onClick={()=>setEditId(null)}>Done</button></td>
              </tr>
            ) : (
              <tr key={x.id}>
                <td className="mono nowrap">{x.date}</td>
                <td><span className={"chip chip-"+x.type.toLowerCase()}>{x.type}</span></td>
                <td className="cat">{x.category}</td>
                <td className="det">{x.note||<span className="dim">—</span>}</td>
                <td className="r mono" style={{color:x.type==="Income"?"var(--emerald)":x.type==="Savings"?"var(--teal)":"var(--ink)"}}>
                  {x.type==="Income"?"+":"−"}{fmt2(x.amount)}</td>
                <td className="rowacts">
                  <button className="ap-rowbtn" onClick={()=>setEditId(x.id)}>Edit</button>
                  <button className="ap-rowbtn del" onClick={()=>deleteEntry(x.id)}>×</button>
                </td>
              </tr>
            ))}
            {list.length===0 && <tr><td colSpan={6} className="ap-empty">{state.entries.length ? "No transactions match these filters." : "No transactions yet — log some from the Dashboard."}</td></tr>}
          </tbody>
        </table>
      </div>
    </section>
  );
}

/* ================= YEAR ================= */
function YearTip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (<div className="ap-tip"><div className="ap-tip-t">{label}</div>
    {payload.map((p)=>(<div key={p.dataKey} className="ap-tip-row"><span style={{color:p.color}}>{p.dataKey}</span><b>{fmt(p.value)}</b></div>))}</div>);
}

function Year({ state, year, goMonth }) {
  const planExp = (m) => state.categories.Expenses.reduce((a,c)=> a + (state.plan.Expenses?.[c]?.[mk(year,m)]||0), 0);
  const rows = useMemo(() => Array.from({length:12}, (_,i)=>{
    const m = i+1, key = mk(year,m);
    const ent = state.entries.filter((e)=>e.date.slice(0,7)===key);
    const inc = ent.filter((e)=>e.type==="Income").reduce((a,e)=>a+e.amount,0);
    const exp = ent.filter((e)=>e.type==="Expenses").reduce((a,e)=>a+e.amount,0);
    const sav = ent.filter((e)=>e.type==="Savings").reduce((a,e)=>a+e.amount,0);
    return { m, label: MLABEL[i], inc, exp, sav, budget: planExp(m), net: inc-exp, count: ent.length };
  }), [state, year]);

  const tot = rows.reduce((a,r)=>({inc:a.inc+r.inc, exp:a.exp+r.exp, sav:a.sav+r.sav, budget:a.budget+r.budget}),{inc:0,exp:0,sav:0,budget:0});

  const catMap = {};
  state.entries.filter((e)=>e.type==="Expenses" && e.date.slice(0,4)===String(year))
    .forEach((e)=>{ catMap[e.category]=(catMap[e.category]||0)+e.amount; });
  const topCats = Object.entries(catMap).map(([c,v])=>({c,v})).sort((a,b)=>b.v-a.v).slice(0,10);
  const maxCat = topCats[0]?.v || 1;

  const chartData = rows.map((r)=>({ name:r.label, Income:Math.round(r.inc), Expenses:Math.round(r.exp), Net:Math.round(r.net) }));
  const hasData = tot.inc>0 || tot.exp>0;

  return (
    <>
      <section className="ap-summary">
        <Stat label={year+" income"} val={tot.inc} color="var(--emerald)"/>
        <Stat label="Expenses" val={tot.exp} color="var(--clay)"/>
        <Stat label="Saved" val={tot.sav} color="var(--teal)"/>
        <Stat label="Net" val={tot.inc-tot.exp} color={(tot.inc-tot.exp)<0?"var(--clay)":"var(--ink)"} hero/>
      </section>

      <div className="ap-card" style={{marginBottom:16}}>
        <h3 className="ap-mini-t" style={{marginBottom:6}}>Monthly flow · {year}</h3>
        {hasData ? (
          <div style={{height:260}}>
            <YearChart data={chartData}/>
          </div>
        ) : <p className="ap-empty">No transactions logged in {year} yet.</p>}
        <div className="ap-legend"><span><i style={{background:"var(--emerald)"}}/>Income</span>
          <span><i style={{background:"var(--clay)"}}/>Expenses</span><span><i style={{background:"var(--navy)"}}/>Net</span></div>
      </div>

      <div className="ap-yeargrid">
        <div className="ap-card">
          <h3 className="ap-mini-t">By month</h3>
          <table className="ap-yeartable">
            <thead><tr><th>Month</th><th className="r">Budget</th><th className="r">Spent</th><th className="r">Δ</th><th className="r">Net</th></tr></thead>
            <tbody>
              {rows.map((r)=>{
                const d = r.budget - r.exp;
                return (
                  <tr key={r.m} onClick={()=>goMonth(r.m)} title="Open this month">
                    <td className="mlbl">{r.label}{r.count>0 && <em className="ap-cnt">{r.count}</em>}</td>
                    <td className="r mono dim">{r.budget?fmt(r.budget):"—"}</td>
                    <td className="r mono">{r.exp?fmt(r.exp):"—"}</td>
                    <td className="r mono" style={{color: r.budget? (d>=0?"var(--emerald)":"var(--clay)"):"var(--ink-soft)"}}>{r.budget?((d>=0?"+":"")+fmt(d)):"—"}</td>
                    <td className="r mono" style={{color: r.net>=0?"var(--emerald)":"var(--clay)"}}>{(r.inc||r.exp)?fmt(r.net):"—"}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot><tr><td>Total</td><td className="r mono dim">{fmt(tot.budget)}</td><td className="r mono">{fmt(tot.exp)}</td>
              <td className="r mono" style={{color:(tot.budget-tot.exp)>=0?"var(--emerald)":"var(--clay)"}}>{((tot.budget-tot.exp)>=0?"+":"")+fmt(tot.budget-tot.exp)}</td>
              <td className="r mono" style={{color:(tot.inc-tot.exp)>=0?"var(--emerald)":"var(--clay)"}}>{fmt(tot.inc-tot.exp)}</td></tr></tfoot>
          </table>
        </div>

        <div className="ap-card">
          <h3 className="ap-mini-t">Top categories · {year}</h3>
          {topCats.length ? (
            <ul className="ap-catbars">
              {topCats.map((t)=>(
                <li key={t.c}>
                  <div className="row"><span className="nm">{t.c}</span><span className="mono vl">{fmt(t.v)}</span></div>
                  <div className="ap-track ap-track-sm"><div className="ap-fill" style={{width:(t.v/maxCat*100)+"%",background:"var(--clay)"}}/></div>
                </li>
              ))}
            </ul>
          ) : <p className="ap-empty">Nothing spent in {year} yet.</p>}
        </div>
      </div>
    </>
  );
}

/* ================= YEAR CHART (dependency-free SVG) ================= */
function YearChart({ data }) {
  const W = 720, H = 240, padL = 46, padR = 12, padT = 14, padB = 26;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const top = Math.max(1, ...data.map(d => Math.max(d.Income, d.Expenses, d.Net)));
  const bottom = Math.min(0, ...data.map(d => d.Net));
  const range = (top - bottom) || 1;
  const y = (v) => padT + innerH * (1 - (v - bottom) / range);
  const groupW = innerW / data.length;
  const barW = Math.min(12, groupW * 0.3);
  const ticks = 4;
  const grid = Array.from({ length: ticks + 1 }, (_, i) => bottom + range * i / ticks);
  const zero = y(0);
  const pts = data.map((d, i) => [padL + groupW * (i + 0.5), y(d.Net)]);
  const linePath = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  return (
    <svg viewBox={"0 0 " + W + " " + H} width="100%" height="240" preserveAspectRatio="xMidYMid meet">
      {grid.map((gv, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={y(gv)} y2={y(gv)} stroke="var(--line)" strokeWidth="1" />
          <text x={padL - 7} y={y(gv) + 3} textAnchor="end" fontSize="9" fontFamily="JetBrains Mono" fill="var(--ink-soft)">
            {"$" + Math.round(gv / 1000) + "k"}</text>
        </g>
      ))}
      {data.map((d, i) => {
        const cx = padL + groupW * (i + 0.5);
        return (
          <g key={d.name}>
            <rect x={cx - barW - 1} y={Math.min(y(d.Income), zero)} width={barW} height={Math.abs(zero - y(d.Income))} fill="var(--emerald)" rx="2">
              <title>{d.name + " Income: $" + d.Income.toLocaleString()}</title></rect>
            <rect x={cx + 1} y={Math.min(y(d.Expenses), zero)} width={barW} height={Math.abs(zero - y(d.Expenses))} fill="var(--clay)" rx="2">
              <title>{d.name + " Expenses: $" + d.Expenses.toLocaleString()}</title></rect>
            <text x={cx} y={H - 9} textAnchor="middle" fontSize="10" fontFamily="Archivo" fill="var(--ink-soft)">{d.name}</text>
          </g>
        );
      })}
      <path d={linePath} fill="none" stroke="var(--navy)" strokeWidth="2.5" />
      {pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="2.7" fill="var(--navy)">
          <title>{data[i].name + " Net: $" + data[i].Net.toLocaleString()}</title></circle>
      ))}
    </svg>
  );
}

/* ================= AUTH (login / signup) ================= */
function Auth({ onAuthed }) {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [info, setInfo] = useState("");
  const submit = async () => {
    setErr(""); setInfo("");
    if (!email || !pw) { setErr("Enter your email and password."); return; }
    if (mode === "signup" && pw.length < 6) { setErr("Password must be at least 6 characters."); return; }
    setBusy(true);
    try {
      if (mode === "signup") {
        const { data, error } = await sb.auth.signUp({ email: email.trim(), password: pw });
        if (error) throw error;
        if (data.session) onAuthed(data.session);
        else setInfo("Account created. Check your email to confirm, then sign in.");
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pw });
        if (error) throw error;
        onAuthed(data.session);
      }
    } catch (e) { setErr((e && e.message) || "Something went wrong."); }
    finally { setBusy(false); }
  };
  return (
    <div className="ap-auth-wrap">
      <div className="ap-auth">
        <div className="ap-auth-k">Family Budget</div>
        <h1>Ramirez Rojas<span className="ap-heart">♥</span><span className="ap-bill">💵</span></h1>
        <p className="sub">{mode === "signup" ? "Create your account to start budgeting together." : "Sign in to your family budget."}</p>
        {err && <div className="err">{err}</div>}
        {info && <div className="info">{info}</div>}
        <label>Email</label>
        <input type="email" value={email} autoFocus autoComplete="email" placeholder="you@email.com"
          onChange={(e) => setEmail(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />
        <label>Password</label>
        <input type="password" value={pw} autoComplete={mode === "signup" ? "new-password" : "current-password"} placeholder="••••••••"
          onChange={(e) => setPw(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />
        <button className="go" onClick={submit} disabled={busy}>
          {busy ? "Please wait…" : mode === "signup" ? "Create account" : "Sign in"}</button>
        <div className="toggle">
          {mode === "signup" ? "Already have an account? " : "New here? "}
          <button onClick={() => { setMode(mode === "signup" ? "signin" : "signup"); setErr(""); setInfo(""); }}>
            {mode === "signup" ? "Sign in" : "Create one"}</button>
        </div>
      </div>
    </div>
  );
}

/* ================= ROOT (auth gate) ================= */
function Root() {
  const [session, setSession] = useState(undefined);
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = sb.auth.onAuthStateChange((_evt, s) => setSession(s));
    return () => { try { sub.subscription.unsubscribe(); } catch (e) {} };
  }, []);
  const signOut = async () => { await sb.auth.signOut(); setSession(null); };
  if (session === undefined) return <div className="ap-root"><Styles /><p className="ap-loading">Loading…</p></div>;
  if (!session) return <React.Fragment><Styles /><Auth onAuthed={setSession} /></React.Fragment>;
  const email = (session.user.email || "").toLowerCase();
  if (!ALLOWED.includes(email)) return <React.Fragment><Styles /><Denied email={session.user.email} onSignOut={signOut} /></React.Fragment>;
  return <App supabase={sb} session={session} onSignOut={signOut} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

</script>
</body>
</html>
