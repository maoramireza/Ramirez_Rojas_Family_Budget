const BASELINE = {"categories": {"Income": ["Salary Mao", "Salary Ingrid", "Primas Ingrid", "Other"], "Expenses": ["House Mortgage", "Cell phones", "Pepco", "Water", "Amazon Prime", "Disney+", "Netflix", "Sofa", "Apple Care Ipad y Celular Mao", "Car Insurance", "Verizon", "Peloton Monthly subscription", "Metro", "Gas", "Groceries", "Restaurants and fun", "Shopping", "Carro", "Mantenimiento casa", "Futbol Luca", "Lavado carro", "Pelo Ingrid", "Comedor"], "Savings": ["Ahorro Ingrid", "Ahorro Mao"]}, "buckets": {"Subscriptions": {"name": "Subscriptions"}, "Utilities": {"name": "Utilities"}, "Transportation": {"name": "Transportation"}, "Entertainment": {"name": "Entertainment"}}, "plan": {"Income": {"Salary Mao": {"2024-06": 4700, "2024-07": 4700, "2024-08": 4700, "2024-09": 4700, "2024-10": 4700, "2024-11": 4700, "2024-12": 4700}, "Salary Ingrid": {"2024-06": 4870, "2024-07": 4870, "2024-08": 4870, "2024-09": 4870, "2024-10": 4870, "2024-11": 4870, "2024-12": 4870}, "Primas Ingrid": {"2024-07": 1000, "2024-12": 2300}, "Other": {}}, "Expenses": {"House Mortgage": {"2024-06": 4050, "2024-07": 4050, "2024-08": 4050, "2024-09": 4050, "2024-10": 4050, "2024-11": 4050, "2024-12": 4050}, "Cell phones": {"2024-06": 86, "2024-07": 86, "2024-08": 86, "2024-09": 86, "2024-10": 86, "2024-11": 86, "2024-12": 86}, "Pepco": {"2024-06": 180, "2024-07": 190, "2024-08": 190, "2024-09": 180, "2024-10": 170, "2024-11": 190, "2024-12": 200}, "Water": {"2024-06": 200, "2024-08": 200, "2024-10": 200, "2024-12": 200}, "Amazon Prime": {"2024-06": 15, "2024-07": 15, "2024-08": 15, "2024-09": 15, "2024-10": 15, "2024-11": 15, "2024-12": 15}, "Disney+": {"2024-06": 20, "2024-07": 20, "2024-08": 20, "2024-09": 20, "2024-10": 20, "2024-11": 20, "2024-12": 20}, "Netflix": {"2024-06": 10, "2024-07": 10, "2024-08": 10, "2024-09": 10, "2024-10": 10, "2024-11": 10, "2024-12": 10}, "Sofa": {"2024-06": 1410, "2024-07": 1450, "2024-08": 1450, "2024-09": 950}, "Apple Care Ipad y Celular Mao": {"2024-06": 22, "2024-07": 22, "2024-08": 22, "2024-09": 22, "2024-10": 22, "2024-11": 22, "2024-12": 22}, "Car Insurance": {"2024-06": 207, "2024-07": 207, "2024-08": 207, "2024-09": 207, "2024-10": 207, "2024-11": 207, "2024-12": 207}, "Verizon": {"2024-06": 90, "2024-07": 90, "2024-08": 90, "2024-09": 90, "2024-10": 90, "2024-11": 90, "2024-12": 90}, "Peloton Monthly subscription": {"2024-06": 47, "2024-07": 47, "2024-08": 47, "2024-09": 47, "2024-10": 47, "2024-11": 47, "2024-12": 47}, "Metro": {"2024-06": 140, "2024-07": 140, "2024-08": 140, "2024-09": 140, "2024-10": 140, "2024-11": 140, "2024-12": 140}, "Gas": {"2024-06": 300, "2024-07": 300, "2024-08": 300, "2024-09": 300, "2024-10": 300, "2024-11": 300, "2024-12": 300}, "Groceries": {"2024-06": 728, "2024-07": 800, "2024-08": 800, "2024-09": 800, "2024-10": 750, "2024-11": 750, "2024-12": 1150}, "Restaurants and fun": {"2024-06": 500, "2024-07": 500, "2024-08": 400, "2024-09": 300, "2024-10": 500, "2024-11": 500, "2024-12": 2000}, "Shopping": {"2024-06": 500, "2024-07": 500, "2024-08": 500, "2024-09": 500, "2024-10": 500, "2024-11": 500, "2024-12": 2000}, "Carro": {"2024-06": 25, "2024-07": 25, "2024-08": 25, "2024-09": 25, "2024-10": 25, "2024-11": 25, "2024-12": 25}, "Mantenimiento casa": {"2024-06": 1000}, "Futbol Luca": {"2024-07": 250, "2024-08": 266, "2024-10": 266, "2024-12": 266}, "Lavado carro": {"2024-06": 40, "2024-07": 40, "2024-08": 40, "2024-09": 40, "2024-10": 40, "2024-11": 40, "2024-12": 40}, "Pelo Ingrid": {"2024-09": 350}, "Comedor": {"2024-10": 2132}}, "Savings": {"Ahorro Ingrid": {"2024-07": 1414, "2024-08": 356, "2024-09": 719, "2024-11": 1289, "2024-12": 502}, "Ahorro Mao": {"2024-07": 414, "2024-08": 356, "2024-09": 719, "2024-11": 1289, "2024-12": 500}}}};
const TYPES = ["Income", "Expenses", "Savings"];
const MLABEL = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const pad = (n) => String(n).padStart(2, "0");
const mk = (y, m) => `${y}-${pad(m)}`;
const fmt = (n) => { const r = Math.round(n); return (r<0?"-":"") + "$" + Math.abs(r).toLocaleString("en-US"); };
const fmt2 = (n) => (n<0?"-":"") + "$" + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const uid = () => (window.crypto?.randomUUID?.() || String(Date.now()+Math.random()));

function App({ session, onSignOut }) {
  const [state, setState] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [archives, setArchives] = useState([]);
  const [online, setOnline] = useState([]);
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth()+1);
  const [tab, setTab] = useState("dashboard");
  const [showLogoutWarning, setShowLogoutWarning] = useState(false);
  const [secondsLeft, setSecondsLeft] = useState(0);
  const firstSave = useRef(true);
  const lastSavedRef = useRef(null);
  const stateRef = useRef(null);
  const lastActivityRef = useRef(Date.now());
  const warningShownRef = useRef(false);
  const INACTIVITY_TIMEOUT = 30 * 60 * 1000;
  const WARNING_TIME = 2 * 60 * 1000;

  /* ---- load from Supabase ---- */
  useEffect(() => {
    (async () => {
      let init = null;
      try {
        const { data, error } = await sb.from("budgets").select("state").eq("id", "family").maybeSingle();
        if (!error && data && data.state) init = data.state;
      } catch (e) {}
      const initial = init || { ...structuredClone(BASELINE), entries: [] };
      lastSavedRef.current = JSON.stringify(initial);
      setState(initial);
      setLoaded(true);
      try { const a = await window.loadArchives(); setArchives(a || []); } catch (e) {}
    })();
  }, []);

  /* ---- save (robust, with visible status + flush on hide) ---- */
  useEffect(() => { stateRef.current = state; }, [state]);

  const doSave = async (st) => {
    if (!st) return;
    const json = JSON.stringify(st);
    if (json === lastSavedRef.current) return;
    setSaveStatus("saving");
    try {
      const { error } = await sb.from("budgets").upsert(
        { id: "family", state: st, updated_at: new Date().toISOString(), updated_by: session?.user?.id },
        { onConflict: "id" }
      );
      if (error) throw error;
      lastSavedRef.current = json;
      setSaveStatus("saved");
      setTimeout(() => setSaveStatus((s) => s === "saved" ? "idle" : s), 1600);
    } catch (e) {
      setSaveStatus("error");
    }
  };

  useEffect(() => {
    if (!loaded || !state) return;
    if (firstSave.current) { firstSave.current = false; return; }
    if (JSON.stringify(state) === lastSavedRef.current) return;
    const t = setTimeout(() => doSave(state), 600);
    return () => clearTimeout(t);
  }, [state, loaded]);

  useEffect(() => {
    const flush = () => { const st = stateRef.current; if (st && JSON.stringify(st) !== lastSavedRef.current) doSave(st); };
    const onVis = () => { if (document.visibilityState === "hidden") flush(); };
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("pagehide", flush);
    return () => { document.removeEventListener("visibilitychange", onVis); window.removeEventListener("pagehide", flush); };
  }, []);

  /* ---- realtime ---- */
  useEffect(() => {
    if (!loaded) return;
    const ch = sb.channel("budgets-changes")
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "budgets", filter: "id=eq.family" },
        (payload) => { if (payload.new?.state) { lastSavedRef.current = JSON.stringify(payload.new.state); setState(payload.new.state); } })
      .subscribe();
    return () => { sb.removeChannel(ch); };
  }, [loaded]);

  /* ---- live presence (who's here) ---- */
  useEffect(() => {
    if (!loaded) return;
    const myEmail = (session?.user?.email || "").toLowerCase();
    const ch = sb.channel("family-presence", { config: { presence: { key: myEmail } } });
    ch.on("presence", { event: "sync" }, () => { setOnline(Object.keys(ch.presenceState())); });
    ch.subscribe(async (status) => { if (status === "SUBSCRIBED") await ch.track({ email: myEmail, at: new Date().toISOString() }); });
    return () => { sb.removeChannel(ch); };
  }, [loaded]);

  /* ---- inactivity timeout ---- */
  const resetActivity = () => { lastActivityRef.current = Date.now(); warningShownRef.current = false; setShowLogoutWarning(false); };
  const handleLogout = () => { if (onSignOut) onSignOut(); };
  useEffect(() => {
    if (!loaded) return;
    const handleActivity = () => resetActivity();
    const events = ["mousedown", "keydown", "scroll", "touchstart"];
    events.forEach((e) => document.addEventListener(e, handleActivity));
    const interval = setInterval(() => {
      const elapsed = Date.now() - lastActivityRef.current;
      const remaining = INACTIVITY_TIMEOUT - elapsed;
      if (remaining <= 0) { clearInterval(interval); events.forEach((e)=>document.removeEventListener(e, handleActivity)); handleLogout(); }
      else if (remaining <= WARNING_TIME) { if (!warningShownRef.current) { warningShownRef.current = true; setShowLogoutWarning(true); } setSecondsLeft(Math.ceil(remaining/1000)); }
    }, 1000);
    return () => { clearInterval(interval); events.forEach((e)=>document.removeEventListener(e, handleActivity)); };
  }, [loaded]);

  const month_key = mk(year, month);
  const update = (fn) => setState((prev) => { const next = structuredClone(prev); fn(next); return next; });

  const setPlanAmt = (type, cat, key, amt) => update((s) => {
    s.plan[type] = s.plan[type] || {}; s.plan[type][cat] = s.plan[type][cat] || {};
    if (amt && amt > 0) s.plan[type][cat][key] = amt; else delete s.plan[type][cat][key];
  });
  const addCat = (type, name) => update((s) => {
    name = (name||"").trim(); if (!name || s.categories[type].includes(name)) return;
    s.categories[type].push(name); s.plan[type] = s.plan[type]||{}; s.plan[type][name] = {};
  });
  const removeCat = (type, cat) => update((s) => {
    s.categories[type] = s.categories[type].filter((c)=>c!==cat);
    if (s.plan[type]) delete s.plan[type][cat];
  });
  const renameCat = (type, oldN, newN) => update((s) => {
    newN = (newN||"").trim(); if (!newN || oldN===newN || s.categories[type].includes(newN)) return;
    s.categories[type] = s.categories[type].map((c)=>c===oldN?newN:c);
    if (s.plan[type]?.[oldN]) { s.plan[type][newN] = {...s.plan[type][oldN]}; delete s.plan[type][oldN]; }
    s.entries = s.entries.map((e)=> e.type===type&&e.category===oldN ? {...e, category:newN} : e);
  });
  const copyFrom = (srcKey) => update((s) => {
    TYPES.forEach((type)=> s.categories[type].forEach((c)=>{
      const v = s.plan[type]?.[c]?.[srcKey];
      s.plan[type]=s.plan[type]||{}; s.plan[type][c]=s.plan[type][c]||{};
      if (v) s.plan[type][c][month_key] = v;
    }));
  });
  const resetPlan = () => { if (!confirm("Reset all categories and budget amounts to the original plan? Your logged transactions are kept.")) return;
    update((s)=>{ s.categories = structuredClone(BASELINE.categories); s.plan = structuredClone(BASELINE.plan); }); };
  const addEntry = (e) => update((s)=> s.entries.unshift(e));
  const editEntry = (id, patch) => update((s)=> { s.entries = s.entries.map((x)=>x.id===id?{...x,...patch}:x); });
  const deleteEntry = (id) => update((s)=> { s.entries = s.entries.filter((x)=>x.id!==id); });
  const importTxns = (rows) => update((s)=> {
    rows.forEach((r)=>{ if (!s.categories[r.type].includes(r.category)) s.categories[r.type].push(r.category); s.entries.unshift(r); });
  });

  /* ---- buckets ---- */
  const addBucket = (name) => update((s)=>{ if(!s.buckets) s.buckets={}; if(s.buckets[name]) return; s.buckets[name]={name}; });
  const renameBucket = (oldN,newN) => update((s)=>{ if(!s.buckets||!s.buckets[oldN]||newN===oldN) return; s.buckets[newN]={name:newN}; delete s.buckets[oldN]; s.entries.forEach((e)=>{ if(e.bucket===oldN) e.bucket=newN; }); });
  const deleteBucket = (name) => update((s)=>{ if(!s.buckets||!s.buckets[name]) return; delete s.buckets[name]; s.entries.forEach((e)=>{ if(e.bucket===name) e.bucket=undefined; }); });
  const setBucketForEntry = (id, b) => update((s)=>{ const e=s.entries.find((x)=>x.id===id); if(e) e.bucket=b||undefined; });

  /* ---- expense split between partners (stores Mao's % share; 50 = even default) ---- */
  const setSplit = (cat, pct) => update((s)=>{ if(!s.split) s.split={}; if(pct===50) delete s.split[cat]; else s.split[cat]=pct; });

  /* ---- end year archive ---- */
  const endYear = async () => {
    const yr = year;
    if (!confirm(`Archive the ${yr} budget and start ${yr+1} fresh?\n\nThis is reversible — you can Restore ${yr} anytime from this same section. Your logged transactions are never deleted.`)) return;
    try {
      await window.saveArchive(yr, state);
      update((s)=>{ TYPES.forEach((type)=>{ s.plan[type]={}; s.categories[type].forEach((c)=>{ s.plan[type][c]={}; }); }); });
      setYear(yr+1); setMonth(1);
      const a = await window.loadArchives(); setArchives(a||[]);
      alert(`✓ ${yr} archived. You're now budgeting ${yr+1}. You can Restore ${yr} anytime.`);
    } catch (e) { alert("Error archiving: " + e.message); }
  };

  const restoreYear = async (yr) => {
    const a = archives.find((x)=>x.year===yr);
    if (!a || !a.state) { alert("No archived data found for " + yr); return; }
    if (!confirm(`Restore ${yr}? This brings back ${yr}'s budgeted amounts and categories. Your logged transactions are kept as-is.`)) return;
    update((s)=>{
      if (a.state.plan) s.plan = structuredClone(a.state.plan);
      if (a.state.categories) s.categories = structuredClone(a.state.categories);
      if (a.state.buckets) s.buckets = structuredClone(a.state.buckets);
    });
    setYear(yr); setMonth(1);
    alert(`✓ ${yr} restored. You're now viewing ${yr}.`);
  };

  const stepMonth = (d) => { let m=month+d, y=year; if(m<1){m=12;y--;} if(m>12){m=1;y++;} setMonth(m); setYear(y); };

  if (!loaded || !state) return <div className="ap-root"><Styles/><p className="ap-loading">Loading…</p></div>;

  return (
    <div className="ap-root">
      <Styles/>

      {showLogoutWarning && (
        <div className="ap-modal-overlay" onClick={resetActivity}>
          <div className="ap-modal" onClick={(e)=>e.stopPropagation()}>
            <h3>Session timeout</h3>
            <p>You'll be signed out in <b>{secondsLeft} seconds</b> due to inactivity.</p>
            <div className="ap-modal-actions">
              <button className="ap-modal-primary" onClick={resetActivity}>Stay signed in</button>
              <button className="ap-modal-secondary" onClick={handleLogout}>Sign out now</button>
            </div>
          </div>
        </div>
      )}

      <div className="ap-wrap">
        <header className="ap-head">
          <div>
            <div className="ap-kicker">Family Budget · <span className="ap-user">{session?.user?.email}</span> · <button className="ap-signout" onClick={handleLogout}>Sign out</button></div>
            <h1 className="ap-title">Ramirez Rojas<span className="ap-heart">♥</span><span className="ap-bill">💵</span></h1>
          </div>
          <div className="ap-periodbox">
            <div className="ap-statusline">
              {(() => { const me=(session?.user?.email||"").toLowerCase(); const others=online.filter((e)=>e!==me);
                return others.length>0
                  ? <span className="ap-presence"><i className="pdot on"/>{others.map((e)=>NAMES[e]||e.split("@")[0]).join(", ")} online</span>
                  : <span className="ap-presence"><i className="pdot off"/>Just you</span>; })()}
              <span className="ap-saved" style={{opacity: saveStatus==="idle"?0:1, color: saveStatus==="error"?"var(--clay)":saveStatus==="saving"?"var(--ink-soft)":"var(--emerald)", cursor: saveStatus==="error"?"pointer":"default"}}
                onClick={()=>{ if(saveStatus==="error") doSave(stateRef.current); }}>
                {saveStatus==="saving" ? "saving…" : saveStatus==="error" ? "⚠ not saved — tap to retry" : "✓ saved"}
              </span>
            </div>
            <div className="ap-period">
              <button className="ap-arrow" onClick={()=>stepMonth(-1)} aria-label="Previous month">‹</button>
              <select value={month} onChange={(e)=>setMonth(+e.target.value)}>
                {MLABEL.map((l,i)=>(<option key={l} value={i+1}>{l}</option>))}
              </select>
              <input className="ap-year" type="number" value={year} onChange={(e)=>setYear(+e.target.value||year)} />
              <button className="ap-arrow" onClick={()=>stepMonth(1)} aria-label="Next month">›</button>
              <button className="ap-todaybtn" onClick={()=>{ const d=new Date(); setYear(d.getFullYear()); setMonth(d.getMonth()+1); }} title="Jump to current month">Today</button>
            </div>
          </div>
        </header>

        <nav className="ap-tabs">
          {[["dashboard","Dashboard"],["planning","Planning"],["transactions","Tracking"],["year","Year"],["trends","📊 Trends"],["split","⚖️ Split"]].map(([k,l])=>(
            <button key={k} className={tab===k?"on":""} onClick={()=>setTab(k)}>{l}</button>
          ))}
        </nav>

        {tab==="dashboard" && (
          <Dashboard state={state} year={year} month={month} month_key={month_key}
            addEntry={addEntry} deleteEntry={deleteEntry}/>
        )}
        {tab==="planning" && (
          <Planning state={state} year={year} month={month} month_key={month_key}
            setPlanAmt={setPlanAmt} addCat={addCat} removeCat={removeCat} renameCat={renameCat}
            copyFrom={copyFrom} resetPlan={resetPlan}
            addBucket={addBucket} renameBucket={renameBucket} deleteBucket={deleteBucket}/>
        )}
        {tab==="year" && (
          <Year state={state} year={year} goMonth={(m)=>{ setMonth(m); setTab("dashboard"); }}/>
        )}
        {tab==="transactions" && (
          <Transactions state={state} editEntry={editEntry} deleteEntry={deleteEntry} importTxns={importTxns} setBucketForEntry={setBucketForEntry}/>
        )}
        {tab==="trends" && (
          <Trends state={state} archives={archives} currentYear={year} endYear={endYear} restoreYear={restoreYear}/>
        )}
        {tab==="split" && (
          <Split state={state} month={month} month_key={month_key} setSplit={setSplit}/>
        )}

        <footer className="ap-foot">
          Auto-saves to your shared family budget and syncs live across devices · {state.entries.length} records logged.
        </footer>
      </div>
    </div>
  );
}

/* ================= DASHBOARD ================= */
function Dashboard({ state, year, month, month_key, addEntry, deleteEntry }) {
  const [q, setQ] = useState("");
  const buckets = Object.keys(state.buckets || {});
  const planAmt = (type, cat) => state.plan[type]?.[cat]?.[month_key] || 0;
  const monthEntries = state.entries.filter((e)=>e.date.slice(0,7)===month_key);
  const spentBy = (type) => { const o={}; monthEntries.filter((e)=>e.type===type).forEach((e)=>o[e.category]=(o[e.category]||0)+e.amount); return o; };

  const expSpent = spentBy("Expenses");
  const envelopes = useMemo(() => {
    const cats = [...new Set([...state.categories.Expenses, ...Object.keys(expSpent)])];
    return cats.map((c)=>({ c, budget: planAmt("Expenses",c), spent: expSpent[c]||0 }))
      .filter((e)=> e.budget>0 || e.spent>0)
      .map((e)=>({ ...e, remaining: e.budget - e.spent }))
      .sort((a,b)=> b.budget-a.budget || b.spent-a.spent);
  }, [state, month_key]);

  const incBudget = state.categories.Income.reduce((a,c)=>a+planAmt("Income",c),0);
  const expBudget = state.categories.Expenses.reduce((a,c)=>a+planAmt("Expenses",c),0);
  const savBudget = state.categories.Savings.reduce((a,c)=>a+planAmt("Savings",c),0);
  const spentTotal = monthEntries.filter((e)=>e.type==="Expenses").reduce((a,e)=>a+e.amount,0);
  const usedPct = expBudget>0 ? (spentTotal/expBudget)*100 : (spentTotal>0?120:0);
  const remaining = expBudget - spentTotal;

  return (
    <>
      <section className="ap-summary">
        <Stat label="Planned income" val={incBudget} color="var(--emerald)"/>
        <Stat label="Budgeted" val={expBudget}/>
        <Stat label="Spent" val={spentTotal} color="var(--clay)"/>
        <Stat label="Left to spend" val={remaining} color={remaining<0?"var(--clay)":"var(--ink)"} hero/>
      </section>

      <div className="ap-overall">
        <div className="ap-overall-top">
          <span>{usedPct.toFixed(0)}% of budget used</span>
          <span className="mono">{fmt(spentTotal)} / {fmt(expBudget)}</span>
        </div>
        <div className="ap-track ap-track-lg">
          <div className="ap-fill" style={{width:Math.min(usedPct,100)+"%",
            background: usedPct>100?"var(--clay)":usedPct>85?"var(--navy)":"var(--emerald)"}}/>
        </div>
        {savBudget>0 && <div className="ap-note">Plan sets aside <b>{fmt(savBudget)}</b> to savings · unallocated {fmt(incBudget-expBudget-savBudget)}</div>}
      </div>

      <AddBar state={state} month_key={month_key} addEntry={addEntry}/>

      <div className="ap-envsearch">
        <input type="text" placeholder="Search expense categories…" value={q} onChange={(e)=>setQ(e.target.value)}/>
        {q && <button onClick={()=>setQ("")}>×</button>}
      </div>

      <section className="ap-env-grid">
        {envelopes.filter((e)=> !q || e.c.toLowerCase().includes(q.toLowerCase())).map((e)=>(
          <Envelope key={e.c} env={e}
            items={monthEntries.filter((x)=>x.type==="Expenses"&&x.category===e.c)}
            month_key={month_key} addEntry={addEntry}
            onDelete={deleteEntry} buckets={buckets}/>
        ))}
        {envelopes.length===0 && <p className="ap-loading">No expense budget or spending for {MLABEL[month-1]} {year}. Set one in Planning.</p>}
        {envelopes.length>0 && envelopes.filter((e)=> !q || e.c.toLowerCase().includes(q.toLowerCase())).length===0 && <p className="ap-loading">No expense category matches "{q}".</p>}
      </section>

      <MiniPanel title="Savings" rows={state.categories.Savings} planAmt={(c)=>planAmt("Savings",c)} spent={spentBy("Savings")} accent="teal" verb="saved"/>
      <MiniPanel title="Income received" rows={state.categories.Income} planAmt={(c)=>planAmt("Income",c)} spent={spentBy("Income")} accent="emerald" verb="received"/>
    </>
  );
}

function Stat({ label, val, color, hero }) {
  return (
    <div className={"ap-stat"+(hero?" hero":"")}>
      <span className="lbl">{label}</span>
      <span className="val" style={color&&!hero?{color}:undefined}>{fmt(val)}</span>
    </div>
  );
}

function Envelope({ env, items, month_key, addEntry, onDelete, buckets }) {
  const [open, setOpen] = useState(false);
  const [adding, setAdding] = useState(false);
  const [amt, setAmt] = useState("");
  const [note, setNote] = useState("");
  const [bucket, setBucket] = useState("");
  const pct = env.budget>0 ? (env.spent/env.budget)*100 : (env.spent>0?120:0);
  const over = env.budget>0 && Math.round(env.spent) > Math.round(env.budget);
  const color = over ? "var(--clay)" : pct>85 ? "var(--navy)" : "var(--emerald)";
  const todayISO = new Date().toISOString().slice(0,10);
  const defDate = todayISO.slice(0,7)===month_key ? todayISO : month_key + "-01";
  const submit = () => {
    const a = parseFloat(amt); if (!a || a<=0) return;
    addEntry({ id: uid(), date: defDate, type:"Expenses", category: env.c, amount: Math.round(a*100)/100, note: note.trim(), bucket: bucket||undefined });
    setAmt(""); setNote(""); setBucket(""); setAdding(false);
  };
  return (
    <div className={"ap-env"+(over?" over":"")}>
      <div className="ap-env-top">
        <span className="ap-env-name" onClick={()=>items.length&&setOpen(!open)} style={{cursor:items.length?"pointer":"default"}}>
          {env.c}{items.length>0 && <em className="ap-cnt">{items.length}</em>}</span>
        <span className="ap-env-rem" style={{color: over?"var(--clay)":"var(--ink-soft)"}}>
          {env.budget>0 ? (over?fmt(Math.abs(env.remaining))+" over":fmt(env.remaining)+" left") : "unbudgeted"}
        </span>
      </div>
      <div className="ap-track"><div className="ap-fill" style={{width:Math.min(pct,100)+"%",background:color}}/></div>
      <div className="ap-env-foot">
        <span className="mono">{fmt(env.spent)} <span className="dim">{env.budget>0?"of "+fmt(env.budget):"no budget"}</span></span>
        <button className="ap-envadd" onClick={()=>setAdding(!adding)}>{adding?"Cancel":"+ Add"}</button>
      </div>
      {adding && (
        <div className="ap-envform">
          <span className="cur">$</span>
          <input className="amt" type="number" autoFocus placeholder="0.00" value={amt}
            onChange={(e)=>setAmt(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()}/>
          <input className="note" type="text" placeholder="note (optional)" value={note}
            onChange={(e)=>setNote(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()}/>
          {buckets && buckets.length>0 && (
            <select className="bkt" value={bucket} onChange={(e)=>setBucket(e.target.value)}>
              <option value="">No bucket</option>
              {buckets.map((b)=>(<option key={b} value={b}>{b}</option>))}
            </select>
          )}
          <button className="ap-envgo" onClick={submit}>Log</button>
        </div>
      )}
      {open && (
        <ul className="ap-env-items">
          {items.map((x)=>(
            <li key={x.id}><span className="d">{x.date.slice(8)}</span>
              <span className="n">{x.note||x.name||"—"}{x.bucket && <em className="ap-cnt" style={{marginLeft:6}}>{x.bucket}</em>}</span>
              <span className="a mono">{fmt2(x.amount)}</span>
              <button className="x" onClick={()=>onDelete(x.id)} title="Delete">×</button></li>
          ))}
        </ul>
      )}
    </div>
  );
}

function MiniPanel({ title, rows, planAmt, spent, accent, verb }) {
  const list = [...new Set([...rows, ...Object.keys(spent)])].filter((c)=> planAmt(c)>0 || (spent[c]||0)>0);
  if (list.length===0) return null;
  return (
    <section className="ap-mini">
      <h3 className="ap-mini-t">{title}</h3>
      <div className="ap-mini-rows">
        {list.map((c)=>{
          const target = planAmt(c), got = spent[c]||0;
          const pct = target>0 ? Math.min((got/target)*100,100) : (got>0?100:0);
          return (<div key={c} className="ap-mini-row">
            <span className="nm">{c}</span>
            <div className="ap-track ap-track-sm"><div className="ap-fill" style={{width:pct+"%",background:`var(--${accent})`}}/></div>
            <span className="mono vl">{fmt(got)} <span className="dim">{target>0?"/ "+fmt(target):verb}</span></span>
          </div>);
        })}
      </div>
    </section>
  );
}

function Combo({ value, onChange, options, placeholder }) {
  const [open, setOpen] = useState(false);
  const [q, setQ] = useState("");
  const filtered = options.filter((o) => o.toLowerCase().includes(q.toLowerCase()));
  return (
    <div className="ap-combo">
      <input type="text" value={open ? q : value} placeholder={placeholder}
        onFocus={()=>{ setOpen(true); setQ(""); }}
        onChange={(e)=>{ setQ(e.target.value); setOpen(true); }}
        onBlur={()=>setTimeout(()=>setOpen(false), 150)}
        onKeyDown={(e)=>{ if(e.key==="Enter" && filtered[0]){ onChange(filtered[0]); setOpen(false); e.target.blur(); } if(e.key==="Escape"){ setOpen(false); e.target.blur(); } }}/>
      {open && (
        <ul className="ap-combo-list">
          {filtered.map((o)=>(<li key={o} onMouseDown={(e)=>{ e.preventDefault(); onChange(o); setOpen(false); }}>{o}</li>))}
          {filtered.length===0 && <li className="none">No match</li>}
        </ul>
      )}
    </div>
  );
}

function AddBar({ state, month_key, addEntry }) {
  const [type, setType] = useState("Expenses");
  const [category, setCategory] = useState(state.categories.Expenses[0] || "");
  const todayISO = new Date().toISOString().slice(0,10);
  const dflt = () => todayISO.slice(0,7)===month_key ? todayISO : month_key + "-01";
  const [date, setDate] = useState(dflt());
  const [amount, setAmount] = useState("");
  const [note, setNote] = useState("");
  const [bucket, setBucket] = useState("");
  useEffect(()=>{ setDate(dflt()); }, [month_key]);
  const cats = state.categories[type] || [];
  const buckets = Object.keys(state.buckets || {});
  useEffect(()=>{ if (!cats.includes(category)) setCategory(cats[0]||""); }, [type]);

  const add = () => {
    const amt = parseFloat(amount); if (!amt || amt<=0 || !category) return;
    addEntry({ id: uid(), date, type, category, amount: Math.round(amt*100)/100, note: note.trim(), bucket: (type==="Expenses"&&bucket&&bucket!=="No bucket")?bucket:undefined });
    setAmount(""); setNote(""); setBucket("");
  };
  return (
    <div className="ap-addbar">
      <span className="ap-add-lbl">Log</span>
      <select value={type} onChange={(e)=>setType(e.target.value)}>
        {TYPES.map((t)=>(<option key={t}>{t}</option>))}
      </select>
      <div className="wide"><Combo value={category} onChange={setCategory} options={cats} placeholder="Search category…"/></div>
      {type==="Expenses" && buckets.length>0 && (
        <div className="bktwrap"><Combo value={bucket} onChange={(v)=>setBucket(v==="No bucket"?"":v)} options={["No bucket", ...buckets]} placeholder="Bucket…"/></div>
      )}
      <input type="date" value={date} onChange={(e)=>setDate(e.target.value)}/>
      <input className="amt" type="number" placeholder="0.00" value={amount}
        onChange={(e)=>setAmount(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&add()}/>
      <input className="note" type="text" placeholder="note (optional)" value={note}
        onChange={(e)=>setNote(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&add()}/>
      <button className="ap-addbtn" onClick={add}>Add</button>
    </div>
  );
}

/* ================= PLANNING ================= */
function Planning({ state, year, month, month_key, setPlanAmt, addCat, removeCat, renameCat, copyFrom, resetPlan, addBucket, renameBucket, deleteBucket }) {
  const planAmt = (type, c) => state.plan[type]?.[c]?.[month_key] || 0;
  const total = (type) => state.categories[type].reduce((a,c)=>a+planAmt(type,c),0);
  const toAllocate = total("Income") - total("Expenses") - total("Savings");
  const [srcM, setSrcM] = useState(month===1?12:month-1);
  const [srcY, setSrcY] = useState(month===1?year-1:year);
  useEffect(()=>{ setSrcM(month===1?12:month-1); setSrcY(month===1?year-1:year); }, [month, year]);

  return (
    <section className="ap-plan">
      <div className="ap-plan-bar">
        <div className={"ap-alloc"+(toAllocate===0?" ok":toAllocate<0?" neg":"")}>
          <span>To allocate</span><b>{fmt(toAllocate)}</b>
        </div>
        <div className="ap-plan-actions">
          <div className="ap-copyfrom">
            <span>Copy from</span>
            <select value={srcM} onChange={(e)=>setSrcM(+e.target.value)}>
              {MLABEL.map((l,i)=>(<option key={l} value={i+1}>{l}</option>))}
            </select>
            <input className="src-year" type="number" value={srcY} onChange={(e)=>setSrcY(+e.target.value||srcY)}/>
            <button onClick={()=>copyFrom(mk(srcY,srcM))}>Copy</button>
          </div>
          <button className="ghost" onClick={resetPlan}>Reset to original</button>
        </div>
      </div>
      <p className="ap-plan-hint">Editing budget for <b>{MLABEL[month-1]} {month_key.slice(0,4)}</b>. Aim to bring "To allocate" to $0 (zero-based budgeting).</p>

      <BucketManager state={state} addBucket={addBucket} renameBucket={renameBucket} deleteBucket={deleteBucket}/>

      {TYPES.map((type)=>(
        <PlanSection key={type} type={type} cats={state.categories[type]} planAmt={(c)=>planAmt(type,c)}
          total={total(type)} setPlanAmt={(c,v)=>setPlanAmt(type,c,month_key,v)}
          addCat={(n)=>addCat(type,n)} removeCat={(c)=>removeCat(type,c)} renameCat={(o,n)=>renameCat(type,o,n)}/>
      ))}
    </section>
  );
}

function BucketManager({ state, addBucket, renameBucket, deleteBucket }) {
  const [newB, setNewB] = useState("");
  const buckets = Object.keys(state.buckets || {});
  const count = (b) => (state.entries||[]).filter((e)=>e.bucket===b).length;
  const add = () => { const v=newB.trim(); if(v && !state.buckets?.[v]){ addBucket(v); setNewB(""); } };
  return (
    <div className="ap-plansec">
      <div className="ap-plansec-head">
        <h3 style={{color:"var(--navy)"}}>Buckets</h3>
        <span className="mono total">{buckets.length}</span>
      </div>
      <p className="ap-plan-hint" style={{margin:"2px 0 10px"}}>Optional groups for transactions (e.g. "Subscriptions" for Netflix, Disney+…). Assign them in Tracking.</p>
      <div className="ap-planrows">
        {buckets.map((b)=>(
          <div key={b} className="ap-planrow">
            <BucketName name={b} onRename={(n)=>renameBucket(b,n)}/>
            <span className="mono dim" style={{fontSize:12}}>{count(b)} items</span>
            <button className="ap-del" onClick={()=>{ if(confirm(`Delete bucket "${b}"? Transactions stay, they just lose this tag.`)) deleteBucket(b); }} title="Remove bucket">×</button>
          </div>
        ))}
        {buckets.length===0 && <p className="ap-empty">No buckets yet.</p>}
      </div>
      <div className="ap-addcat">
        <input type="text" placeholder="+ add bucket" value={newB}
          onChange={(e)=>setNewB(e.target.value)} onKeyDown={(e)=>{ if(e.key==="Enter") add(); }}/>
        <button onClick={add}>Add</button>
      </div>
    </div>
  );
}

function BucketName({ name, onRename }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(name);
  useEffect(()=>setDraft(name),[name]);
  return editing ? (
    <input className="ap-renamein" value={draft} autoFocus
      onChange={(e)=>setDraft(e.target.value)}
      onBlur={()=>{ onRename(draft); setEditing(false); }}
      onKeyDown={(e)=>{ if(e.key==="Enter"){ onRename(draft); setEditing(false);} if(e.key==="Escape"){ setDraft(name); setEditing(false);} }}/>
  ) : (
    <span className="ap-planrow-name" onClick={()=>setEditing(true)} title="Click to rename">{name}</span>
  );
}

function PlanSection({ type, cats, planAmt, total, setPlanAmt, addCat, removeCat, renameCat }) {
  const [newCat, setNewCat] = useState("");
  const tone = type==="Income"?"emerald":type==="Savings"?"teal":"clay";
  return (
    <div className="ap-plansec">
      <div className="ap-plansec-head">
        <h3 style={{color:`var(--${tone})`}}>{type}</h3>
        <span className="mono total">{fmt(total)}</span>
      </div>
      <div className="ap-planrows">
        {cats.map((c)=>(
          <PlanRow key={c} name={c} amount={planAmt(c)}
            onAmount={(v)=>setPlanAmt(c,v)} onRename={(n)=>renameCat(c,n)} onRemove={()=>removeCat(c)}/>
        ))}
        {cats.length===0 && <p className="ap-empty">No categories yet.</p>}
      </div>
      <div className="ap-addcat">
        <input type="text" placeholder={"+ add "+type.toLowerCase().replace(/s$/,"")+" category"} value={newCat}
          onChange={(e)=>setNewCat(e.target.value)}
          onKeyDown={(e)=>{ if(e.key==="Enter"){ addCat(newCat); setNewCat(""); } }}/>
        <button onClick={()=>{ addCat(newCat); setNewCat(""); }}>Add</button>
      </div>
    </div>
  );
}

function PlanRow({ name, amount, onAmount, onRename, onRemove }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(name);
  const [amtFocus, setAmtFocus] = useState(false);
  useEffect(()=>setDraft(name),[name]);
  const shownAmt = amtFocus ? (amount||"") : (amount ? amount.toLocaleString("en-US") : "");
  return (
    <div className="ap-planrow">
      {editing ? (
        <input className="ap-renamein" value={draft} autoFocus
          onChange={(e)=>setDraft(e.target.value)}
          onBlur={()=>{ onRename(draft); setEditing(false); }}
          onKeyDown={(e)=>{ if(e.key==="Enter"){ onRename(draft); setEditing(false);} if(e.key==="Escape"){ setDraft(name); setEditing(false);} }}/>
      ) : (
        <span className="ap-planrow-name" onClick={()=>setEditing(true)} title="Click to rename">{name}</span>
      )}
      <div className="ap-amtwrap">
        <span className="cur">$</span>
        <input type="text" inputMode="numeric" value={shownAmt} placeholder="0"
          onFocus={()=>setAmtFocus(true)} onBlur={()=>setAmtFocus(false)}
          onChange={(e)=>onAmount(parseFloat(e.target.value.replace(/[^0-9.]/g,""))||0)}/>
      </div>
      <button className="ap-del" onClick={onRemove} title="Remove category">×</button>
    </div>
  );
}

/* ================= TRANSACTIONS ================= */
function Transactions({ state, editEntry, deleteEntry, importTxns, setBucketForEntry }) {
  const [q, setQ] = useState("");
  const [ftype, setFtype] = useState("All");
  const [fcat, setFcat] = useState("All");
  const [editId, setEditId] = useState(null);
  const [msg, setMsg] = useState("");
  const fileRef = useRef(null);
  const buckets = Object.keys(state.buckets || {});

  const norm = (s)=> (s==null?"":String(s)).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const catOptions = useMemo(()=>{
    const base = ftype==="All"
      ? [...state.categories.Income, ...state.categories.Expenses, ...state.categories.Savings]
      : [...(state.categories[ftype]||[])];
    const fromEntries = state.entries.filter((e)=> ftype==="All"||e.type===ftype).map((e)=>e.category);
    return [...new Set([...base, ...fromEntries])].sort((a,b)=>a.localeCompare(b));
  }, [state, ftype]);

  const nq = norm(q);
  const list = state.entries
    .filter((x)=> ftype==="All" ? true : x.type===ftype)
    .filter((x)=> fcat==="All" ? true : x.category===fcat)
    .filter((x)=> nq==="" ? true : (norm(x.category).includes(nq) || norm(x.note).includes(nq) || norm(x.name).includes(nq)))
    .slice().sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:0);

  const net = list.reduce((a,b)=> b.type==="Income"?a+b.amount:b.type==="Expenses"?a-b.amount:a, 0);
  const allCats = (t) => state.categories[t] || [];

  const exportCsv = () => {
    const rows = state.entries.slice().sort((a,b)=> a.date<b.date?1:-1)
      .map((e)=>({ Date:e.date, Type:e.type, Category:e.category, Amount:e.amount, Note:e.note||e.name||"", Bucket:e.bucket||"" }));
    const csv = Papa.unparse(rows.length?rows:[{Date:"",Type:"",Category:"",Amount:"",Note:"",Bucket:""}]);
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "budget-transactions.csv"; a.click();
  };

  const onFile = (ev) => {
    const f = ev.target.files?.[0]; if (!f) return;
    Papa.parse(f, { header:true, skipEmptyLines:true, complete:(res)=>{
      const valid = []; let skipped = 0;
      res.data.forEach((row)=>{
        const get = (k)=>{ const kk = Object.keys(row).find((x)=>x.toLowerCase().trim()===k); return kk ? String(row[kk]).trim() : ""; };
        const date = get("date"); let type = get("type"); const category = get("category");
        const amount = parseFloat(String(get("amount")).replace(/[$,]/g,"")); const note = get("note"); const bucket = get("bucket");
        type = TYPES.find((t)=>t.toLowerCase()===type.toLowerCase());
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date) || !type || !category || !amount || amount<=0) { skipped++; return; }
        valid.push({ id: uid(), date, type, category, amount: Math.round(amount*100)/100, note, bucket: bucket||undefined });
      });
      if (valid.length) importTxns(valid);
      setMsg(`Imported ${valid.length} record${valid.length===1?"":"s"}${skipped?`, skipped ${skipped} invalid`:""}.`);
      setTimeout(()=>setMsg(""), 5000);
      ev.target.value = "";
    }});
  };

  return (
    <section className="ap-card">
      <div className="ap-filtbar">
        <input className="ap-search" type="text" placeholder="Search category or note…" value={q} onChange={(e)=>setQ(e.target.value)}/>
        <select value={ftype} onChange={(e)=>{ setFtype(e.target.value); setFcat("All"); }}>
          {["All",...TYPES].map((t)=>(<option key={t}>{t}</option>))}
        </select>
        <select value={fcat} onChange={(e)=>setFcat(e.target.value)}>
          <option value="All">All categories</option>
          {catOptions.map((c)=>(<option key={c} value={c}>{c}</option>))}
        </select>
        <button className="ap-iobtn" onClick={exportCsv}>Export CSV</button>
        <button className="ap-iobtn" onClick={()=>fileRef.current?.click()}>Import CSV</button>
        <input ref={fileRef} type="file" accept=".csv,text/csv" style={{display:"none"}} onChange={onFile}/>
        <div className="ap-count">{list.length} records · net <b style={{color:net>=0?"var(--emerald)":"var(--clay)"}}>{fmt(net)}</b></div>
      </div>
      {msg && <div className="ap-importmsg">{msg}</div>}
      <div className="ap-txnscroll">
        <table className="ap-txntable">
          <thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Note</th><th>Bucket</th><th className="r">Amount</th><th></th></tr></thead>
          <tbody>
            {list.map((x)=> editId===x.id ? (
              <tr key={x.id} className="editing">
                <td><input type="date" value={x.date} onChange={(e)=>editEntry(x.id,{date:e.target.value})}/></td>
                <td><select value={x.type} onChange={(e)=>{const t=e.target.value; editEntry(x.id,{type:t, category: allCats(t).includes(x.category)?x.category:(allCats(t)[0]||x.category)});}}>
                  {TYPES.map((t)=>(<option key={t}>{t}</option>))}</select></td>
                <td><select value={x.category} onChange={(e)=>editEntry(x.id,{category:e.target.value})}>
                  {[...new Set([...allCats(x.type), x.category])].map((c)=>(<option key={c}>{c}</option>))}</select></td>
                <td><input type="text" value={x.note||x.name||""} onChange={(e)=>editEntry(x.id,{note:e.target.value})}/></td>
                <td><select value={x.bucket||""} onChange={(e)=>setBucketForEntry(x.id, e.target.value||undefined)}>
                  <option value="">—</option>
                  {buckets.map((b)=>(<option key={b} value={b}>{b}</option>))}</select></td>
                <td className="r"><input className="amt" type="number" value={x.amount} onChange={(e)=>editEntry(x.id,{amount:Math.round((parseFloat(e.target.value)||0)*100)/100})}/></td>
                <td><button className="ap-rowbtn done" onClick={()=>setEditId(null)}>Done</button></td>
              </tr>
            ) : (
              <tr key={x.id}>
                <td className="mono nowrap">{x.date}</td>
                <td><span className={"chip chip-"+x.type.toLowerCase()}>{x.type}</span></td>
                <td className="cat">{x.category}</td>
                <td className="det">{x.note||x.name||<span className="dim">—</span>}</td>
                <td>{x.bucket ? <span className="bchip">{x.bucket}</span> : <span className="dim">—</span>}</td>
                <td className="r mono" style={{color:x.type==="Income"?"var(--emerald)":x.type==="Savings"?"var(--teal)":"var(--ink)"}}>
                  {x.type==="Income"?"+":"−"}{fmt2(x.amount)}</td>
                <td className="rowacts">
                  <button className="ap-rowbtn" onClick={()=>setEditId(x.id)}>Edit</button>
                  <button className="ap-rowbtn del" onClick={()=>deleteEntry(x.id)}>×</button>
                </td>
              </tr>
            ))}
            {list.length===0 && <tr><td colSpan={7} className="ap-empty">{state.entries.length ? "No transactions match these filters." : "No transactions yet — log some from the Dashboard."}</td></tr>}
          </tbody>
        </table>
      </div>
    </section>
  );
}

/* ================= YEAR ================= */
function YearChart({ data }) {
  const W = 720, H = 240, padL = 46, padR = 12, padT = 14, padB = 26;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const top = Math.max(1, ...data.map(d => Math.max(d.Income, d.Expenses, d.Net)));
  const bottom = Math.min(0, ...data.map(d => d.Net));
  const range = (top - bottom) || 1;
  const y = (v) => padT + innerH * (1 - (v - bottom) / range);
  const groupW = innerW / data.length;
  const barW = Math.min(12, groupW * 0.3);
  const ticks = 4;
  const grid = Array.from({ length: ticks + 1 }, (_, i) => bottom + range * i / ticks);
  const zero = y(0);
  const pts = data.map((d, i) => [padL + groupW * (i + 0.5), y(d.Net)]);
  const linePath = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1)).join(" ");
  return (
    <svg viewBox={"0 0 " + W + " " + H} width="100%" height="240" preserveAspectRatio="xMidYMid meet">
      {grid.map((gv, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={y(gv)} y2={y(gv)} stroke="var(--line)" strokeWidth="1" />
          <text x={padL - 7} y={y(gv) + 3} textAnchor="end" fontSize="9" fontFamily="JetBrains Mono" fill="var(--ink-soft)">
            {"$" + Math.round(gv / 1000) + "k"}</text>
        </g>
      ))}
      {data.map((d, i) => {
        const cx = padL + groupW * (i + 0.5);
        return (
          <g key={d.name}>
            <rect x={cx - barW - 1} y={Math.min(y(d.Income), zero)} width={barW} height={Math.abs(zero - y(d.Income))} fill="var(--emerald)" rx="2">
              <title>{d.name + " Income: $" + d.Income.toLocaleString()}</title></rect>
            <rect x={cx + 1} y={Math.min(y(d.Expenses), zero)} width={barW} height={Math.abs(zero - y(d.Expenses))} fill="var(--clay)" rx="2">
              <title>{d.name + " Expenses: $" + d.Expenses.toLocaleString()}</title></rect>
            <text x={cx} y={H - 9} textAnchor="middle" fontSize="10" fontFamily="Archivo" fill="var(--ink-soft)">{d.name}</text>
          </g>
        );
      })}
      <path d={linePath} fill="none" stroke="var(--navy)" strokeWidth="2.5" />
      {pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r="2.7" fill="var(--navy)">
          <title>{data[i].name + " Net: $" + data[i].Net.toLocaleString()}</title></circle>
      ))}
    </svg>
  );
}

function Year({ state, year, goMonth }) {
  const planExp = (m) => state.categories.Expenses.reduce((a,c)=> a + (state.plan.Expenses?.[c]?.[mk(year,m)]||0), 0);
  const rows = useMemo(() => Array.from({length:12}, (_,i)=>{
    const m = i+1, key = mk(year,m);
    const ent = state.entries.filter((e)=>e.date.slice(0,7)===key);
    const inc = ent.filter((e)=>e.type==="Income").reduce((a,e)=>a+e.amount,0);
    const exp = ent.filter((e)=>e.type==="Expenses").reduce((a,e)=>a+e.amount,0);
    const sav = ent.filter((e)=>e.type==="Savings").reduce((a,e)=>a+e.amount,0);
    return { m, label: MLABEL[i], inc, exp, sav, budget: planExp(m), net: inc-exp, count: ent.length };
  }), [state, year]);

  const tot = rows.reduce((a,r)=>({inc:a.inc+r.inc, exp:a.exp+r.exp, sav:a.sav+r.sav, budget:a.budget+r.budget}),{inc:0,exp:0,sav:0,budget:0});

  const catMap = {};
  state.entries.filter((e)=>e.type==="Expenses" && e.date.slice(0,4)===String(year))
    .forEach((e)=>{ catMap[e.category]=(catMap[e.category]||0)+e.amount; });
  const topCats = Object.entries(catMap).map(([c,v])=>({c,v})).sort((a,b)=>b.v-a.v).slice(0,10);
  const maxCat = topCats[0]?.v || 1;

  const bucketMap = {};
  state.entries.filter((e)=>e.type==="Expenses" && e.date.slice(0,4)===String(year))
    .forEach((e)=>{ const b = e.bucket || "Untagged"; bucketMap[b]=(bucketMap[b]||0)+e.amount; });
  const topBuckets = Object.entries(bucketMap).map(([c,v])=>({c,v})).sort((a,b)=>b.v-a.v);
  const maxBucket = topBuckets[0]?.v || 1;
  const hasBucketSpend = topBuckets.some((b)=>b.c!=="Untagged");

  const chartData = rows.map((r)=>({ name:r.label, Income:Math.round(r.inc), Expenses:Math.round(r.exp), Net:Math.round(r.net) }));
  const hasData = tot.inc>0 || tot.exp>0;

  return (
    <>
      <section className="ap-summary">
        <Stat label={year+" income"} val={tot.inc} color="var(--emerald)"/>
        <Stat label="Expenses" val={tot.exp} color="var(--clay)"/>
        <Stat label="Saved" val={tot.sav} color="var(--teal)"/>
        <Stat label="Net" val={tot.inc-tot.exp} color={(tot.inc-tot.exp)<0?"var(--clay)":"var(--ink)"} hero/>
      </section>

      <div className="ap-card" style={{marginBottom:16}}>
        <h3 className="ap-mini-t" style={{marginBottom:6}}>Monthly flow · {year}</h3>
        {hasData ? <YearChart data={chartData}/> : <p className="ap-empty">No transactions logged in {year} yet.</p>}
        <div className="ap-legend"><span><i style={{background:"var(--emerald)"}}/>Income</span>
          <span><i style={{background:"var(--clay)"}}/>Expenses</span><span><i style={{background:"var(--navy)"}}/>Net</span></div>
        <p className="ap-chartnote">The <b>Net</b> line is income minus expenses each month. Above $0 you came out ahead; below $0 you spent more than came in.</p>
      </div>

      <div className="ap-yeargrid">
        <div className="ap-card">
          <h3 className="ap-mini-t">By month</h3>
          <table className="ap-yeartable">
            <thead><tr><th>Month</th><th className="r">Budget</th><th className="r">Spent</th><th className="r">Δ</th><th className="r">Net</th></tr></thead>
            <tbody>
              {rows.map((r)=>{
                const d = r.budget - r.exp;
                return (
                  <tr key={r.m} onClick={()=>goMonth(r.m)} title="Open this month">
                    <td className="mlbl">{r.label}{r.count>0 && <em className="ap-cnt">{r.count}</em>}</td>
                    <td className="r mono dim">{r.budget?fmt(r.budget):"—"}</td>
                    <td className="r mono">{r.exp?fmt(r.exp):"—"}</td>
                    <td className="r mono" style={{color: r.budget? (d>=0?"var(--emerald)":"var(--clay)"):"var(--ink-soft)"}}>{r.budget?((d>=0?"+":"")+fmt(d)):"—"}</td>
                    <td className="r mono" style={{color: r.net>=0?"var(--emerald)":"var(--clay)"}}>{(r.inc||r.exp)?fmt(r.net):"—"}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot><tr><td>Total</td><td className="r mono dim">{fmt(tot.budget)}</td><td className="r mono">{fmt(tot.exp)}</td>
              <td className="r mono" style={{color:(tot.budget-tot.exp)>=0?"var(--emerald)":"var(--clay)"}}>{((tot.budget-tot.exp)>=0?"+":"")+fmt(tot.budget-tot.exp)}</td>
              <td className="r mono" style={{color:(tot.inc-tot.exp)>=0?"var(--emerald)":"var(--clay)"}}>{fmt(tot.inc-tot.exp)}</td></tr></tfoot>
          </table>
        </div>

        <div className="ap-card">
          <h3 className="ap-mini-t">Top categories · {year}</h3>
          {topCats.length ? (
            <ul className="ap-catbars">
              {topCats.map((t)=>(
                <li key={t.c}>
                  <div className="row"><span className="nm">{t.c}</span><span className="mono vl">{fmt(t.v)}</span></div>
                  <div className="ap-track ap-track-sm"><div className="ap-fill" style={{width:(t.v/maxCat*100)+"%",background:"var(--clay)"}}/></div>
                </li>
              ))}
            </ul>
          ) : <p className="ap-empty">Nothing spent in {year} yet.</p>}
        </div>
      </div>

      <div className="ap-card" style={{marginTop:14}}>
        <h3 className="ap-mini-t">Top buckets · {year}</h3>
        {hasBucketSpend ? (
          <ul className="ap-catbars">
            {topBuckets.map((t)=>(
              <li key={t.c}>
                <div className="row"><span className="nm">{t.c==="Untagged" ? <span className="dim">Untagged</span> : t.c}</span><span className="mono vl">{fmt(t.v)}</span></div>
                <div className="ap-track ap-track-sm"><div className="ap-fill" style={{width:(t.v/maxBucket*100)+"%",background:t.c==="Untagged"?"var(--line)":"var(--navy)"}}/></div>
              </li>
            ))}
          </ul>
        ) : <p className="ap-empty">No bucketed spending in {year} yet. Tag expenses with a bucket when you log them, and they'll group here.</p>}
      </div>
    </>
  );
}

/* ================= TRENDS ================= */
function Trends({ state, archives, currentYear, endYear, restoreYear }) {
  const [selectedCats, setSelectedCats] = useState(["Groceries"]);
  const allYears = useMemo(() => {
    const years = []; const yearMap = {};
    (archives || []).forEach((a) => { if (a.year && a.state) { yearMap[a.year] = a.state; years.push(a.year); } });
    yearMap[currentYear] = state; years.push(currentYear);
    return { years: [...new Set(years)].sort((a,b)=>a-b), yearMap };
  }, [archives, state, currentYear]);

  const expenseCategories = state.categories.Expenses || [];
  const trendData = useMemo(() => {
    const result = {};
    selectedCats.forEach((cat) => {
      result[cat] = {};
      allYears.years.forEach((yr) => {
        const ys = allYears.yearMap[yr];
        const entries = ys ? (ys.entries || []).filter((e)=>e.type==="Expenses" && e.category===cat && e.date.slice(0,4)===String(yr)) : [];
        result[cat][yr] = entries.reduce((a,e)=>a+e.amount,0);
      });
    });
    return result;
  }, [selectedCats, allYears]);

  const colors = ["var(--clay)", "var(--teal)", "var(--navy)", "var(--emerald)"];

  return (
    <section className="ap-trends">
      <div className="ap-trends-head">
        <h2 className="ap-mini-t" style={{fontSize:24,margin:"0 0 12px"}}>Spending trends</h2>
        <div className="ap-trend-opts">
          <label>Compare categories:</label>
          <select multiple value={selectedCats} onChange={(e)=>{ const opts=Array.from(e.target.selectedOptions,(o)=>o.value); setSelectedCats(opts.length>0?opts:["Groceries"]); }} className="ap-multiselect">
            {expenseCategories.map((c)=>(<option key={c} value={c}>{c}</option>))}
          </select>
        </div>
      </div>

      {allYears.years.length > 1 ? (
        <>
          <div className="ap-card" style={{marginBottom:16}}>
            <svg viewBox={`0 0 ${50 + allYears.years.length * 80} 300`} width="100%" height="280" preserveAspectRatio="xMidYMid meet">
              {[0,1000,2000,3000,4000,5000].map((val)=>{ const yy=250-(val/5000)*200; return (
                <g key={`g-${val}`}>
                  <line x1="40" y1={yy} x2={40+allYears.years.length*80} y2={yy} stroke="var(--line)" strokeWidth="0.5"/>
                  <text x="35" y={yy+4} fontSize="10" fill="var(--ink-soft)" textAnchor="end" fontFamily="JetBrains Mono">${(val/1000)}k</text>
                </g>); })}
              {selectedCats.map((cat,ci)=>{
                const points = allYears.years.map((yr,i)=>{ const v=trendData[cat]?.[yr]||0; return `${50+i*80},${250-(v/5000)*200}`; }).join(" ");
                return (<g key={`l-${cat}`}>
                  <polyline points={points} fill="none" stroke={colors[ci%colors.length]} strokeWidth="2.5" vectorEffect="non-scaling-stroke"/>
                  {allYears.years.map((yr,i)=>{ const v=trendData[cat]?.[yr]||0; return <circle key={`d-${cat}-${yr}`} cx={50+i*80} cy={250-(v/5000)*200} r="3" fill={colors[ci%colors.length]}/>; })}
                </g>);
              })}
              <line x1="40" y1="250" x2={40+allYears.years.length*80} y2="250" stroke="var(--line)" strokeWidth="1.5"/>
              {allYears.years.map((yr,i)=>(<text key={`y-${yr}`} x={50+i*80} y="275" fontSize="12" fill="var(--ink-soft)" textAnchor="middle" fontFamily="JetBrains Mono">{yr}</text>))}
            </svg>
            <div className="ap-legend">{selectedCats.map((cat,i)=>(<span key={cat}><i style={{background:colors[i%colors.length]}}/>{cat}</span>))}</div>
          </div>

          <div className="ap-card">
            <table className="ap-yeartable">
              <thead><tr><th>Category</th>{allYears.years.map((yr)=>(<th key={yr} className="r">{yr}</th>))}<th className="r">Change</th><th className="r">%</th></tr></thead>
              <tbody>
                {selectedCats.map((cat)=>{
                  const vals = allYears.years.map((yr)=>trendData[cat]?.[yr]||0);
                  const last = vals[vals.length-1], prev = vals[vals.length-2]||0;
                  const change = last-prev, pct = prev>0?((change/prev)*100):0;
                  return (<tr key={cat}>
                    <td className="mlbl">{cat}</td>
                    {vals.map((v,i)=>(<td key={allYears.years[i]} className="r mono">{fmt(v)}</td>))}
                    <td className="r mono" style={{color:change>=0?"var(--clay)":"var(--emerald)"}}>{(change>=0?"+":"")+fmt(change)}</td>
                    <td className="r mono" style={{color:pct>=0?"var(--clay)":"var(--emerald)"}}>{(pct>=0?"+":"")+pct.toFixed(0)}%</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        </>
      ) : (
        <div className="ap-card"><p className="ap-empty">Only {currentYear} so far. At year-end, use <b>Archive {currentYear}</b> below — then you'll see year-over-year trends here.</p></div>
      )}

      <div className="ap-card ap-manageyears">
        <h3 className="ap-mini-t">Manage years</h3>
        <p className="ap-chartnote" style={{margin:"0 0 14px"}}>Archiving snapshots the current year and clears the plan so you can start fresh. It's <b>reversible</b> — your transactions are never deleted, and you can restore any year below.</p>
        <button className="ap-archivebtn" onClick={endYear}>Archive {currentYear} &amp; start {currentYear+1}</button>
        {(archives && archives.length>0) && (
          <div className="ap-archlist">
            <div className="ap-archlbl">Archived years</div>
            {archives.slice().sort((a,b)=>b.year-a.year).map((a)=>(
              <div key={a.year} className="ap-archrow">
                <span className="yr">{a.year}</span>
                <button className="ap-restorebtn" onClick={()=>restoreYear(a.year)}>Restore</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </section>
  );
}

/* ================= SPLIT ================= */
function Split({ state, month, month_key, setSplit }) {
  const planAmt = (c) => state.plan.Expenses?.[c]?.[month_key] || 0;
  const cats = state.categories.Expenses.filter((c)=>planAmt(c)>0).sort((a,b)=>planAmt(b)-planAmt(a));
  const split = state.split || {};
  // Mao's percent share (0-100). Backward compatible with old "mao"/"ingrid"/"split" values.
  const pctOf = (c) => { const v=split[c];
    if (v===undefined || v==="split") return 50;
    if (v==="mao") return 100; if (v==="ingrid") return 0;
    const n=Number(v); return isNaN(n)?50:Math.max(0,Math.min(100,Math.round(n))); };

  let mao = 0, ingrid = 0;
  cats.forEach((c)=>{ const a=planAmt(c); const p=pctOf(c); mao += a*p/100; ingrid += a*(100-p)/100; });
  const total = mao + ingrid;
  const half = total/2;
  const diff = mao - half;
  const maoPct = total>0 ? Math.round(mao/total*100) : 50;
  const ingridPct = 100 - maoPct;

  return (
    <section className="ap-split">
      <p className="ap-plan-hint" style={{marginBottom:14}}>Set who pays each budgeted expense for <b>{MLABEL[month-1]} {month_key.slice(0,4)}</b>. Use the presets, or tap <b>Custom</b> to split a bill any way — like a 60/40 mortgage or a shared car payment. Totals update live.</p>

      <section className="ap-summary" style={{gridTemplateColumns:"repeat(3,1fr)"}}>
        <Stat label="Mao covers" val={mao} color="var(--navy)"/>
        <Stat label="Ingrid covers" val={ingrid} color="var(--teal)"/>
        <Stat label="Total" val={total} hero/>
      </section>

      {total>0 && (
        <div className="ap-splitsummary">
          <div className="ap-splitbar">
            <div className="m" style={{width:maoPct+"%"}}/>
            <div className="i" style={{width:ingridPct+"%"}}/>
          </div>
          <div className="ap-splitpct">
            <span><i style={{background:"var(--navy)"}}/>Mao {maoPct}%</span>
            <span><i style={{background:"var(--teal)"}}/>Ingrid {ingridPct}%</span>
          </div>
          <p className="ap-chartnote" style={{marginTop:10}}>
            {Math.abs(diff) < 0.5
              ? "Right now you're splitting this evenly."
              : <>An even split would be <b>{fmt(half)}</b> each. {diff>0?"Mao":"Ingrid"} is covering {fmt(Math.abs(diff))} more than half — if you wanted to even it out, {diff>0?"Ingrid":"Mao"} would chip in that much. Entirely your call.</>}
          </p>
        </div>
      )}

      <div className="ap-splitlist">
        {cats.map((c)=>(
          <SplitRow key={c} cat={c} amount={planAmt(c)} pct={pctOf(c)} onSet={(p)=>setSplit(c,p)}/>
        ))}
        {cats.length===0 && <p className="ap-empty">No budgeted expenses for {MLABEL[month-1]}. Set budgets in Planning first.</p>}
      </div>
    </section>
  );
}

function SplitRow({ cat, amount, pct, onSet }) {
  const isPreset = pct===0 || pct===50 || pct===100;
  const [showCustom, setShowCustom] = useState(!isPreset);
  const maoAmt = Math.round(amount*pct/100);
  const ingridAmt = Math.round(amount) - maoAmt;
  const preset = (val, label) => (
    <button className={(!showCustom && pct===val)?"on":""} onClick={()=>{ onSet(val); setShowCustom(false); }}>{label}</button>
  );
  return (
    <div className="ap-splitrowwrap">
      <div className="ap-splitrow">
        <div className="ap-splitcat"><span className="nm">{cat}</span><span className="mono amt">{fmt(amount)}</span></div>
        <div className="ap-seg">
          {preset(100,"Mao")}
          {preset(50,"50/50")}
          {preset(0,"Ingrid")}
          <button className={showCustom?"on":""} onClick={()=>setShowCustom(true)}>Custom</button>
        </div>
      </div>
      {showCustom && (
        <div className="ap-customsplit">
          <input className="ap-splitrange" type="range" min="0" max="100" step="1" value={pct} onChange={(e)=>onSet(Number(e.target.value))}/>
          <div className="ap-customvals">
            <span><i style={{background:"var(--navy)"}}/>Mao <b className="mono">{fmt(maoAmt)}</b>
              <input className="ap-pctin" type="number" min="0" max="100" value={pct} onChange={(e)=>onSet(Math.max(0,Math.min(100,Number(e.target.value)||0)))}/>%</span>
            <span><i style={{background:"var(--teal)"}}/>Ingrid <b className="mono">{fmt(ingridAmt)}</b> ({100-pct}%)</span>
          </div>
        </div>
      )}
    </div>
  );
}


function Styles() {
  return (<style>{`
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  :root{--paper:#EDEFF3;--paper2:#FAFBFC;--ink:#1B2230;--ink-soft:#5E6675;
    --line:#D5DAE2;--emerald:#1C6B4B;--teal:#2A7E7B;--clay:#B23A2E;--navy:#23456E;}
  *{box-sizing:border-box;}
  .ap-root{min-height:100vh;background:
    radial-gradient(120% 80% at 12% -10%, #F4F6F9 0%, transparent 55%),
    radial-gradient(120% 80% at 100% 0%, #DEE4EE 0%, transparent 50%), var(--paper);
    color:var(--ink);font-family:'Archivo',sans-serif;-webkit-font-smoothing:antialiased;}
  .ap-wrap{max-width:1060px;margin:0 auto;padding:30px 20px 60px;}
  .mono{font-family:'JetBrains Mono';font-variant-numeric:tabular-nums;}
  .dim{color:var(--ink-soft);opacity:.85;}
  .ap-loading{text-align:center;color:var(--ink-soft);padding:40px 0;}

  .ap-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;
    border-bottom:1.5px solid var(--line);padding-bottom:16px;margin-bottom:18px;}
  .ap-kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);font-weight:700;}
  .ap-user{color:var(--ink-soft);font-weight:600;}
  .ap-signout{background:none;border:none;color:var(--ink-soft);font-family:'JetBrains Mono';font-size:10px;text-decoration:underline;cursor:pointer;padding:0;text-transform:none;letter-spacing:0;}
  .ap-title{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(28px,5vw,44px);line-height:1;margin:5px 0 0;letter-spacing:-.01em;}
  .ap-title .ap-heart{color:var(--navy);font-size:.5em;vertical-align:.35em;margin:0 .12em;}
  .ap-title .ap-bill{font-size:.62em;vertical-align:.12em;}
  .ap-periodbox{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .ap-statusline{display:flex;align-items:center;gap:12px;height:16px;}
  .ap-presence{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono';}
  .pdot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .pdot.on{background:var(--emerald);box-shadow:0 0 0 3px rgba(28,107,75,.15);}
  .pdot.off{background:var(--line);}
  .ap-saved{font-size:11px;color:var(--emerald);font-family:'JetBrains Mono';font-weight:600;transition:opacity .25s ease;}
  .ap-envsearch{display:flex;align-items:center;gap:6px;margin-bottom:14px;}
  .ap-envsearch input{flex:1;font-family:'Archivo';font-size:14px;color:var(--ink);background:var(--paper2);border:1.5px solid var(--line);border-radius:10px;padding:9px 13px;outline:none;}
  .ap-envsearch input:focus{border-color:var(--navy);}
  .ap-envsearch button{background:var(--paper2);border:1.5px solid var(--line);border-radius:10px;width:38px;height:38px;font-size:18px;color:var(--ink-soft);cursor:pointer;}
  .ap-envform .bkt{font-family:'Archivo';font-size:12px;border:1.5px solid var(--line);border-radius:7px;padding:6px 6px;background:var(--paper);outline:none;}
  .ap-period{display:flex;align-items:center;gap:6px;background:var(--paper2);border:1.5px solid var(--line);border-radius:11px;padding:4px;}
  .ap-period select,.ap-year{font-family:'Archivo';font-weight:600;font-size:14px;color:var(--ink);background:transparent;border:none;outline:none;padding:6px 8px;border-radius:7px;}
  .ap-year{width:74px;text-align:center;}
  .ap-arrow{border:none;background:var(--paper);color:var(--ink);font-size:18px;line-height:1;width:30px;height:30px;border-radius:7px;cursor:pointer;}
  .ap-arrow:hover{background:var(--ink);color:var(--paper2);}
  .ap-todaybtn{font-family:'Archivo';font-weight:600;font-size:12px;background:var(--paper);border:1.5px solid var(--line);
    border-radius:7px;padding:6px 11px;cursor:pointer;color:var(--ink-soft);margin-left:2px;}
  .ap-todaybtn:hover{border-color:var(--navy);color:var(--ink);}

  .ap-tabs{display:flex;gap:4px;margin-bottom:18px;border-bottom:1.5px solid var(--line);overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .ap-tabs button{font-family:'Archivo';font-weight:600;font-size:14px;background:none;border:none;cursor:pointer;
    color:var(--ink-soft);padding:10px 16px;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;white-space:nowrap;flex-shrink:0;}
  .ap-tabs button.on{color:var(--ink);border-color:var(--navy);}

  .ap-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
  .ap-stat{background:var(--paper2);border:1.5px solid var(--line);border-radius:13px;padding:13px 15px;display:flex;flex-direction:column;gap:7px;}
  .ap-stat .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .ap-stat .val{font-family:'Fraunces',serif;font-weight:500;font-size:26px;line-height:1;font-variant-numeric:tabular-nums;}
  .ap-stat.hero{background:var(--ink);border-color:var(--ink);}
  .ap-stat.hero .lbl{color:#AEB6C4;}.ap-stat.hero .val{color:var(--paper2);}

  .ap-overall{background:var(--paper2);border:1.5px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:16px;}
  .ap-overall-top{display:flex;justify-content:space-between;font-size:13px;color:var(--ink-soft);margin-bottom:9px;font-weight:500;}
  .ap-note{font-size:12px;color:var(--ink-soft);margin-top:9px;font-family:'JetBrains Mono';}
  .ap-note b{color:var(--teal);}
  .ap-track{width:100%;height:8px;background:var(--line);border-radius:5px;overflow:hidden;}
  .ap-track-lg{height:12px;}.ap-track-sm{height:6px;}
  .ap-fill{height:100%;border-radius:5px;transition:width .3s ease;}
  .ap-manageyears{margin-top:14px;}
  .ap-archivebtn{font-family:'Archivo';font-weight:600;font-size:13px;background:none;color:var(--clay);border:1.5px solid var(--line);border-radius:9px;padding:9px 16px;cursor:pointer;}
  .ap-archivebtn:hover{border-color:var(--clay);background:#FBEEEB;}
  .ap-archlist{margin-top:16px;border-top:1px solid var(--line);padding-top:12px;}
  .ap-archlbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:8px;}
  .ap-archrow{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);}
  .ap-archrow:last-child{border-bottom:none;}
  .ap-archrow .yr{font-family:'JetBrains Mono';font-weight:600;font-size:14px;}
  .ap-restorebtn{font-family:'Archivo';font-weight:600;font-size:12px;background:none;border:1.5px solid var(--line);border-radius:7px;padding:6px 14px;cursor:pointer;color:var(--navy);}
  .ap-restorebtn:hover{border-color:var(--navy);background:#EDF1F7;}

  .ap-addbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;background:var(--paper2);
    border:1.5px solid var(--line);border-radius:13px;padding:11px 13px;margin-bottom:18px;}
  .ap-add-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;}
  .ap-addbar select,.ap-addbar input{font-family:'Archivo';font-size:14px;color:var(--ink);background:var(--paper);
    border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;outline:none;}
  .ap-addbar select:focus,.ap-addbar input:focus{border-color:var(--navy);}
  .ap-addbar .wide{min-width:150px;}.ap-addbar .amt{width:96px;}.ap-addbar .note{flex:1;min-width:120px;}
  .ap-combo{position:relative;}
  .ap-combo input{width:100%;font-family:'Archivo';font-size:14px;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;outline:none;}
  .ap-combo input:focus{border-color:var(--navy);}
  .ap-combo-list{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:50;list-style:none;margin:0;padding:4px;background:var(--paper2);border:1.5px solid var(--line);border-radius:10px;box-shadow:0 12px 30px -12px rgba(27,34,48,.35);max-height:240px;overflow-y:auto;}
  .ap-combo-list li{padding:9px 11px;font-size:14px;border-radius:7px;cursor:pointer;color:var(--ink);}
  .ap-combo-list li:hover{background:#EDF1F7;}
  .ap-combo-list li.none{color:var(--ink-soft);cursor:default;}
  .ap-addbar .bktwrap{min-width:120px;}
  .ap-addbtn{font-family:'Archivo';font-weight:700;font-size:14px;background:var(--ink);color:var(--paper2);
    border:none;border-radius:8px;padding:9px 22px;cursor:pointer;}
  .ap-addbtn:hover{background:var(--emerald);}

  .ap-env-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
  .ap-env{background:var(--paper2);border:1.5px solid var(--line);border-radius:13px;padding:14px 15px;}
  .ap-env.over{border-color:var(--clay);background:#FBEEEB;}
  .ap-env-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:10px;}
  .ap-env-name{font-weight:600;font-size:14px;}
  .ap-cnt{font-style:normal;font-family:'JetBrains Mono';font-size:10px;background:var(--line);color:var(--ink-soft);border-radius:10px;padding:1px 6px;margin-left:6px;}
  .ap-env-rem{font-size:12px;font-weight:600;white-space:nowrap;}
  .ap-env-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:12px;}
  .ap-envadd{font-family:'Archivo';font-weight:600;font-size:11.5px;background:none;border:1.5px solid var(--line);
    border-radius:7px;padding:4px 10px;cursor:pointer;color:var(--ink-soft);}
  .ap-envadd:hover{border-color:var(--emerald);color:var(--emerald);}
  .ap-envform{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
  .ap-envform .cur{font-family:'JetBrains Mono';font-size:13px;color:var(--ink-soft);}
  .ap-envform input{font-family:'Archivo';font-size:13px;border:1.5px solid var(--line);border-radius:7px;padding:6px 8px;background:var(--paper);outline:none;}
  .ap-envform input:focus{border-color:var(--navy);}
  .ap-envform .amt{width:74px;font-family:'JetBrains Mono';text-align:right;}
  .ap-envform .note{flex:1;min-width:0;}
  .ap-envgo{font-family:'Archivo';font-weight:700;font-size:12px;background:var(--ink);color:var(--paper2);border:none;border-radius:7px;padding:7px 12px;cursor:pointer;}
  .ap-envgo:hover{background:var(--emerald);}
  .ap-env-items{list-style:none;margin:11px 0 0;padding:11px 0 0;border-top:1px solid var(--line);}
  .ap-env-items li{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;}
  .ap-env-items .d{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-soft);width:18px;}
  .ap-env-items .n{flex:1;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ap-env-items .x{border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:16px;padding:0 2px;}
  .ap-env-items .x:hover{color:var(--clay);}

  .ap-mini{margin-bottom:16px;}
  .ap-mini-t{font-family:'Fraunces',serif;font-weight:500;font-size:18px;margin:0 0 10px;}
  .ap-mini-rows{background:var(--paper2);border:1.5px solid var(--line);border-radius:13px;padding:6px 16px;}
  .ap-mini-row{display:grid;grid-template-columns:160px 1fr 150px;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--line);}
  .ap-mini-row:last-child{border-bottom:none;}
  .ap-mini-row .nm{font-weight:500;font-size:13.5px;}.ap-mini-row .vl{text-align:right;font-size:12.5px;}

  .ap-plan-bar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px;}
  .ap-alloc{display:flex;align-items:center;gap:10px;background:var(--paper2);border:1.5px solid var(--line);border-radius:11px;padding:10px 16px;}
  .ap-alloc span{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .ap-alloc b{font-family:'Fraunces',serif;font-size:22px;font-weight:500;}
  .ap-alloc.ok{border-color:var(--emerald);}.ap-alloc.ok b{color:var(--emerald);}
  .ap-alloc.neg{border-color:var(--clay);}.ap-alloc.neg b{color:var(--clay);}
  .ap-plan-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .ap-plan-actions button{font-family:'Archivo';font-weight:600;font-size:13px;background:var(--ink);color:var(--paper2);border:none;border-radius:9px;padding:9px 14px;cursor:pointer;}
  .ap-plan-actions button.ghost{background:none;color:var(--ink-soft);border:1.5px solid var(--line);}
  .ap-plan-actions button.ghost:hover{border-color:var(--clay);color:var(--clay);}
  .ap-copyfrom{display:flex;align-items:center;gap:6px;background:var(--paper2);border:1.5px solid var(--line);border-radius:9px;padding:4px 4px 4px 12px;}
  .ap-copyfrom>span{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;}
  .ap-copyfrom select,.ap-copyfrom input{font-family:'Archivo';font-size:13px;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:7px;padding:6px 8px;outline:none;}
  .ap-copyfrom select:focus,.ap-copyfrom input:focus{border-color:var(--navy);}
  .ap-copyfrom .src-year{width:64px;text-align:center;}
  .ap-copyfrom button{font-family:'Archivo';font-weight:700;font-size:13px;background:var(--ink);color:var(--paper2);border:none;border-radius:7px;padding:7px 14px;cursor:pointer;}
  .ap-copyfrom button:hover{background:var(--emerald);}
  .ap-plan-hint{font-size:13px;color:var(--ink-soft);margin:0 0 18px;}
  .ap-plansec{background:var(--paper2);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;}
  .ap-plansec-head{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1.5px solid var(--line);padding-bottom:8px;margin-bottom:6px;}
  .ap-plansec-head h3{font-family:'Fraunces',serif;font-weight:500;font-size:18px;margin:0;}
  .ap-plansec-head .total{font-size:14px;font-weight:600;}
  .ap-planrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);}
  .ap-planrow:last-child{border-bottom:none;}
  .ap-planrow-name{flex:1;font-size:14px;font-weight:500;cursor:pointer;border-bottom:1px dashed transparent;}
  .ap-planrow-name:hover{border-bottom-color:var(--ink-soft);}
  .ap-renamein{flex:1;font-family:'Archivo';font-size:14px;padding:6px 8px;border:1.5px solid var(--navy);border-radius:7px;background:var(--paper);outline:none;}
  .ap-amtwrap{display:flex;align-items:center;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:0 4px 0 9px;}
  .ap-amtwrap:focus-within{border-color:var(--navy);}
  .ap-amtwrap .cur{color:var(--ink-soft);font-size:13px;font-family:'JetBrains Mono';}
  .ap-amtwrap input{width:92px;border:none;background:transparent;outline:none;font-family:'JetBrains Mono';font-size:13.5px;text-align:right;padding:8px 6px;color:var(--ink);}
  .ap-del{border:none;background:none;color:var(--ink-soft);font-size:17px;cursor:pointer;padding:0 4px;}
  .ap-del:hover{color:var(--clay);}
  .ap-addcat{display:flex;gap:8px;margin-top:10px;}
  .ap-addcat input{flex:1;font-family:'Archivo';font-size:13.5px;background:var(--paper);border:1.5px dashed var(--line);border-radius:8px;padding:8px 11px;outline:none;}
  .ap-addcat input:focus{border-style:solid;border-color:var(--navy);}
  .ap-addcat button{font-family:'Archivo';font-weight:600;font-size:13px;background:none;border:1.5px solid var(--line);border-radius:8px;padding:0 16px;cursor:pointer;color:var(--ink);}
  .ap-addcat button:hover{border-color:var(--emerald);color:var(--emerald);}
  .ap-empty{color:var(--ink-soft);font-size:13px;text-align:center;padding:14px 0;}

  .ap-card{background:var(--paper2);border:1.5px solid var(--line);border-radius:16px;padding:18px;}
  .ap-filtbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .ap-filtbar input,.ap-filtbar select{font-family:'Archivo';font-size:14px;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:8px 11px;outline:none;}
  .ap-search{flex:1;min-width:180px;}
  .ap-count{font-size:13px;color:var(--ink-soft);font-family:'JetBrains Mono';margin-left:auto;}
  .ap-txnscroll{max-height:540px;overflow:auto;border:1px solid var(--line);border-radius:10px;}
  .ap-txntable{width:100%;border-collapse:collapse;font-size:13.5px;}
  .ap-txntable th{position:sticky;top:0;background:var(--paper2);text-align:left;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;padding:9px 10px;border-bottom:1.5px solid var(--line);z-index:1;}
  .ap-txntable td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .ap-txntable .r{text-align:right;}.ap-txntable .mono{font-family:'JetBrains Mono';font-size:12.5px;font-variant-numeric:tabular-nums;}
  .ap-txntable .cat{font-weight:500;}.ap-txntable .det{color:var(--ink-soft);}.ap-txntable .nowrap{white-space:nowrap;}
  .ap-txntable.editing td,.ap-txntable tr.editing td{background:#EDF1F7;}
  .ap-txntable input,.ap-txntable select{font-family:'Archivo';font-size:13px;border:1.5px solid var(--line);border-radius:6px;padding:5px 7px;background:var(--paper);outline:none;width:100%;}
  .ap-txntable input.amt{width:90px;text-align:right;font-family:'JetBrains Mono';}
  .bchip{font-size:10.5px;font-weight:700;background:var(--navy);color:var(--paper2);padding:3px 8px;border-radius:20px;white-space:nowrap;}
  .bsel{font-family:'Archivo';font-size:11px;border:1.5px dashed var(--line);border-radius:6px;padding:3px 5px;background:var(--paper);color:var(--ink-soft);outline:none;}
