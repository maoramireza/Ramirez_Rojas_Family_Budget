  .rowacts{white-space:nowrap;text-align:right;}
  .ap-rowbtn{font-family:'Archivo';font-weight:600;font-size:12px;background:none;border:1.5px solid var(--line);border-radius:7px;padding:5px 10px;cursor:pointer;color:var(--ink-soft);margin-left:5px;}
  .ap-rowbtn:hover{border-color:var(--ink);color:var(--ink);}
  .ap-rowbtn.del:hover{border-color:var(--clay);color:var(--clay);}
  .ap-rowbtn.done{background:var(--emerald);color:var(--paper2);border-color:var(--emerald);}
  .chip{font-size:10.5px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:20px;white-space:nowrap;}
  .chip-income{background:#E1EFE6;color:var(--emerald);}.chip-expenses{background:#F4E3DF;color:var(--clay);}.chip-savings{background:#DFEDEC;color:var(--teal);}

  .ap-foot{margin-top:26px;text-align:center;font-size:12px;color:var(--ink-soft);font-family:'JetBrains Mono';}

  .ap-legend{display:flex;gap:18px;margin-top:8px;font-size:12px;color:var(--ink-soft);flex-wrap:wrap;}
  .ap-legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:-1px;}
  .ap-chartnote{font-size:12px;color:var(--ink-soft);margin:10px 0 0;line-height:1.5;}
  .ap-chartnote b{color:var(--navy);}
  .ap-yeargrid{display:grid;grid-template-columns:1.15fr 1fr;gap:14px;}
  .ap-yeartable{width:100%;border-collapse:collapse;font-size:13.5px;}
  .ap-yeartable th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:600;padding:7px 9px;border-bottom:1.5px solid var(--line);}
  .ap-yeartable td{padding:8px 9px;border-bottom:1px solid var(--line);}
  .ap-yeartable .r{text-align:right;}
  .ap-yeartable .mono{font-family:'JetBrains Mono';font-size:12px;font-variant-numeric:tabular-nums;}
  .ap-yeartable .mlbl{font-weight:600;}
  .ap-yeartable tbody tr{cursor:pointer;}
  .ap-yeartable tbody tr:hover td{background:#EDF1F7;}
  .ap-yeartable tfoot td{padding:9px;border-top:1.5px solid var(--line);font-weight:700;font-size:12px;}
  .ap-yeartable tfoot .mono{font-weight:700;}
  .ap-catbars{list-style:none;margin:0;padding:0;}
  .ap-catbars li{padding:7px 0;border-bottom:1px solid var(--line);}
  .ap-catbars li:last-child{border-bottom:none;}
  .ap-catbars .row{display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px;}
  .ap-catbars .nm{font-weight:500;}.ap-catbars .vl{font-size:12px;}

  .ap-iobtn{font-family:'Archivo';font-weight:600;font-size:13px;background:none;border:1.5px solid var(--line);border-radius:8px;padding:8px 13px;cursor:pointer;color:var(--ink);}
  .ap-iobtn:hover{border-color:var(--navy);}
  .ap-importmsg{font-size:12.5px;color:var(--emerald);font-family:'JetBrains Mono';margin-bottom:12px;background:#E7F1EA;border:1px solid #BFD9C9;border-radius:8px;padding:8px 12px;}

  .ap-trend-opts{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .ap-trend-opts label{font-size:13px;color:var(--ink-soft);font-weight:600;}
  .ap-multiselect{font-family:'Archivo';font-size:13px;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:8px;outline:none;min-width:200px;max-height:120px;}
  .ap-trends-head{margin-bottom:16px;}

  /* login */

  @media(max-width:820px){.ap-env-grid{grid-template-columns:repeat(2,1fr);}.ap-yeargrid{grid-template-columns:1fr;}}

/* ================= AUTH ================= */
function AuthScreen() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const submit = async () => {
    setErr("");
    if (!email || !pw) { setErr("Enter your email and password."); return; }
    if (mode==="signup" && pw.length<6) { setErr("Password must be at least 6 characters."); return; }
    setBusy(true);
    try {
      if (mode==="signup") {
        const { error } = await sb.auth.signUp({ email: email.trim(), password: pw });
        if (error) throw error;
      } else {
        const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pw });
        if (error) throw error;
      }
    } catch (e) { setErr((e && e.message) || "Something went wrong."); }
    finally { setBusy(false); }
  };
  return (
    <>
      <Styles/>
      <div className="ap-auth-wrap">
        <div className="ap-auth">
          <div className="ap-auth-k">Family Budget</div>
          <h1>Ramirez Rojas <span className="ap-heart">♥</span> 💵</h1>
          <p className="sub">{mode==="signup" ? "Create your account to start budgeting together." : "Sign in to your family budget."}</p>
          {err && <div className="err">{err}</div>}
          <label>Email</label>
          <input type="email" placeholder="you@email.com" value={email} autoComplete="email"
            onChange={(e)=>setEmail(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()}/>
          <label>Password</label>
          <input type="password" placeholder="••••••••" value={pw} autoComplete={mode==="signup"?"new-password":"current-password"}
            onChange={(e)=>setPw(e.target.value)} onKeyDown={(e)=>e.key==="Enter"&&submit()}/>
          <button className="go" onClick={submit} disabled={busy}>{busy ? "Please wait…" : (mode==="signup"?"Create account":"Sign in")}</button>
          <div className="toggle">
            {mode==="signup" ? "Already have an account? " : "New here? "}
            <button onClick={()=>{ setMode(mode==="signup"?"signin":"signup"); setErr(""); }}>{mode==="signup"?"Sign in":"Create one"}</button>
          </div>
        </div>
      </div>
    </>
  );
}

function Root() {
  const [session, setSession] = useState(undefined);
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => { try { sub.subscription.unsubscribe(); } catch (e) {} };
  }, []);
  if (session === undefined) return <div className="ap-root"><Styles/><p className="ap-loading">Loading…</p></div>;
  if (!session) return <AuthScreen/>;
  const email = (session.user.email||"").toLowerCase();
  if (!ALLOWED.includes(email)) {
    return (
      <>
        <Styles/>
        <div className="ap-auth-wrap"><div className="ap-auth" style={{textAlign:"center"}}>
          <h1 style={{fontSize:24}}>Access restricted</h1>
          <p className="sub">This account isn't authorized for the Ramirez Rojas budget.</p>
          <button className="go" onClick={()=>sb.auth.signOut()}>Sign out</button>
        </div></div>
      </>
    );
  }
  return <App session={session} onSignOut={async ()=>{ await sb.auth.signOut(); setSession(null); }}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);

</script>
